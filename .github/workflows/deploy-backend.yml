name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'api_server.py'
      - 'requirements.txt'
      - 'render.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('Deploy triggered:', d.get('deploy', {}).get('id', 'unknown'))
          "
