name: Deploy Backend to Render

# ============================================================
# 이 파일이 실제 배포 게이트키퍼입니다.
# Render 대시보드 Auto-Deploy는 OFF로 설정해야 합니다.
# 백엔드 관련 파일이 변경될 때만 Render Deploy Hook을 호출합니다.
# ============================================================

on:
  push:
    branches:
      - main
    paths:
      - 'api_server.py'
      - 'requirements.txt'
      - 'render.yaml'
      - 'security_middleware.py'
      - 'email_templates.py'

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (변경 파일 확인용)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 변경된 백엔드 파일 목록 출력
        run: |
          echo "=== 배포 트리거된 변경 파일 ==="
          git diff --name-only HEAD~1 HEAD | grep -E "(api_server|requirements|render\.yaml|security_middleware|email_templates)" || true

      - name: Render Deploy Hook 호출
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render 응답 코드: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "❌ 배포 트리거 실패: HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Render 배포 트리거 완료"
