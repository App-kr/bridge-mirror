name: Security Scan — SAST + Dependency Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 매주 월요일 오전 3시 KST (= UTC 일요일 18:00) 정기 스캔
    - cron: '0 18 * * 0'

permissions:
  contents: read
  security-events: write   # CodeQL SARIF 업로드용

jobs:
  # ── Job 1: Python SAST (bandit) ──────────────────────────────────
  python-sast:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit (HIGH + MEDIUM severity)
        run: |
          bandit -r . \
            --exclude ./.venv,./node_modules,./web_frontend/node_modules,./.next,./bridge_agent/build_temp,./.claude \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json || true

      - name: Parse bandit results
        run: |
          python -c "
          import json, sys
          try:
              with open('bandit-report.json') as f:
                  data = json.load(f)
              results = data.get('results', [])
              highs = [r for r in results if r['issue_severity'] == 'HIGH']
              meds  = [r for r in results if r['issue_severity'] == 'MEDIUM']
              print(f'HIGH: {len(highs)}, MEDIUM: {len(meds)}')
              if highs:
                  print('=== HIGH severity issues ===')
                  for r in highs[:10]:
                      print(f\"  {r['filename']}:{r['line_number']} — {r['issue_text']}\")
                  sys.exit(1)
          except Exception as e:
              print(f'Parse error: {e}')
              sys.exit(1)   # 파싱 실패도 차단 — silent pass 금지
          "

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  # ── Job 2: Secret Scanning (gitleaks) ────────────────────────────
  secret-scan:
    name: Secret Leak Detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 히스토리 스캔

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Job 3: npm Dependency Audit ──────────────────────────────────
  npm-audit:
    name: npm Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: npm audit (critical + fixable high)
        run: |
          npm audit --audit-level=high --json > npm-audit-report.json 2>&1 || true
          node -e "
          const fs = require('fs');
          try {
            const data = JSON.parse(fs.readFileSync('npm-audit-report.json', 'utf8'));
            const vulns = data.metadata?.vulnerabilities || {};
            const advisories = data.vulnerabilities || {};
            console.log('Vulnerabilities summary:', JSON.stringify(vulns));

            // CRITICAL은 무조건 차단
            if ((vulns.critical || 0) > 0) {
              console.error('CRITICAL vulnerabilities found — BLOCK');
              process.exit(1);
            }

            // fixAvailable 타입:
            //   true                      → 단순 패치 (차단)
            //   {isSemVerMajor: false}    → 비파괴적 부모 의존성 업데이트 (차단)
            //   {isSemVerMajor: true}     → 메이저 버전 업 필요 (경고만)
            //   false                     → 패치 없음 (경고만)
            const isFixable = v =>
              v.fixAvailable === true ||
              (v.fixAvailable && typeof v.fixAvailable === 'object' && !v.fixAvailable.isSemVerMajor);
            const fixableHighs = Object.entries(advisories)
              .filter(([,v]) => v.severity === 'high' && isFixable(v));
            const unfixableHighs = Object.entries(advisories)
              .filter(([,v]) => v.severity === 'high' && !isFixable(v));

            if (unfixableHighs.length > 0) {
              console.warn('⚠️  HIGH (no fix available — monitoring only):');
              unfixableHighs.forEach(([name]) => console.warn('   -', name));
            }
            if (fixableHighs.length > 0) {
              console.error('🚨 HIGH vulnerabilities WITH available fix:');
              fixableHighs.forEach(([name]) => console.error('   -', name));
              process.exit(1);
            }
            console.log('✅ No CRITICAL or fixable-HIGH vulnerabilities');
          } catch(e) { console.log('Audit parse error:', e.message); }
          "

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: web_frontend/npm-audit-report.json
          retention-days: 30

  # ── Job 4: Python Dependency Audit (pip-audit) ───────────────────
  pip-safety:
    name: Python Dependency Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json -o pip-audit-report.json 2>&1 || true
            python -c "
          import json, sys
          try:
              with open('pip-audit-report.json') as f:
                  data = json.load(f)
              # pip-audit format: {dependencies: [{name, version, vulns: [...]}]}
              # npm-audit와 동일 정책: fixable만 차단, unfixable은 경고만
              deps = data.get('dependencies', [])
              all_vulns  = [(d['name'], v) for d in deps for v in d.get('vulns', [])]
              fixable    = [(n, v) for n, v in all_vulns if v.get('fix_versions')]
              unfixable  = [(n, v) for n, v in all_vulns if not v.get('fix_versions')]
              if unfixable:
                  print(f'⚠️  {len(unfixable)} CVE(s) — no fix available (monitoring only):')
                  for name, v in unfixable[:5]:
                      aliases = ', '.join(v.get('aliases', [v.get('id','?')]))
                      print(f'   - {name}: {aliases}')
              if fixable:
                  print(f'Python CVEs WITH fix available: {len(fixable)}')
                  for name, v in fixable[:10]:
                      aliases = ', '.join(v.get('aliases', [v.get('id','?')]))
                      print(f'  {name}: {aliases} → fix: {v.get(\"fix_versions\")!r}')
                  sys.exit(1)
              else:
                  print('No fixable Python CVEs found')
          except Exception as e:
              print(f'Parse error: {e}')
              sys.exit(1)   # 파싱 실패도 차단 — silent pass 금지
            "
          else
            echo 'No requirements.txt — skipping'
          fi

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  # ── Job 5: TypeScript + ESLint Security Rules ─────────────────────
  frontend-security:
    name: Frontend Security Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript type check
        id: tsc
        continue-on-error: true
        run: npx tsc --noEmit

      - name: ESLint
        id: eslint
        continue-on-error: true
        run: npx next lint

      - name: Fail if any check failed
        run: |
          TSC="${{ steps.tsc.outcome }}"
          LINT="${{ steps.eslint.outcome }}"
          echo "TypeScript: $TSC | ESLint: $LINT"
          if [[ "$TSC" == "failure" || "$LINT" == "failure" ]]; then
            exit 1
          fi

  # ── Summary Job ───────────────────────────────────────────────────
  security-summary:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [python-sast, secret-scan, npm-audit, pip-safety, frontend-security]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "=== Security Scan Results ==="
          echo "Python SAST:        ${{ needs.python-sast.result }}"
          echo "Secret Detection:   ${{ needs.secret-scan.result }}"
          echo "npm Audit:          ${{ needs.npm-audit.result }}"
          echo "pip Safety:         ${{ needs.pip-safety.result }}"
          echo "Frontend Security:  ${{ needs.frontend-security.result }}"

          BLOCKED=0

          # failure뿐 아니라 skipped도 차단 — != "success" 로 검사
          if [[ "${{ needs.secret-scan.result }}" != "success" ]]; then
            echo "🚨 SECRET LEAK DETECTED — BLOCK MERGE (${{ needs.secret-scan.result }})"
            BLOCKED=1
          fi
          if [[ "${{ needs.python-sast.result }}" != "success" ]]; then
            echo "🚨 HIGH SEVERITY Python vulnerability — BLOCK MERGE (${{ needs.python-sast.result }})"
            BLOCKED=1
          fi
          if [[ "${{ needs.npm-audit.result }}" != "success" ]]; then
            echo "🚨 CRITICAL/fixable-HIGH npm vulnerability — BLOCK MERGE (${{ needs.npm-audit.result }})"
            BLOCKED=1
          fi
          if [[ "${{ needs.pip-safety.result }}" != "success" ]]; then
            echo "🚨 Python dependency CVE detected — BLOCK MERGE (${{ needs.pip-safety.result }})"
            BLOCKED=1
          fi
          if [[ "${{ needs.frontend-security.result }}" != "success" ]]; then
            echo "🚨 Frontend security lint/typecheck failed — BLOCK MERGE (${{ needs.frontend-security.result }})"
            BLOCKED=1
          fi

          if [[ $BLOCKED -eq 1 ]]; then
            exit 1
          fi
          echo "✅ All security checks passed"
