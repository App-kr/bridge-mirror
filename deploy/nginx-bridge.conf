# BRIDGE Nginx Reverse Proxy Configuration
# /etc/nginx/sites-available/bridge

upstream bridge_api {
    server 127.0.0.1:8000;
}

upstream bridge_frontend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name bridgejob.co.kr www.bridgejob.co.kr;

    # Let's Encrypt 인증 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP → HTTPS 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name bridgejob.co.kr www.bridgejob.co.kr;

    # SSL (certbot이 자동 관리)
    ssl_certificate /etc/letsencrypt/live/bridgejob.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bridgejob.co.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net; font-src 'self' data: cdn.jsdelivr.net; img-src 'self' data: https: /uploads/; connect-src 'self' https://*.supabase.co" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # 요청 크기 제한 (기본)
    client_max_body_size 10M;

    # Uploads — 정적 파일 서빙 (FastAPI 거치지 않음)
    location /uploads/ {
        alias /opt/bridge/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        # 이미지/문서만 허용
        location ~* \.(jpg|jpeg|png|webp|pdf|doc|docx|mp4|mov|webm)$ {
            try_files $uri =404;
        }
        # 나머지 확장자 차단
        return 403;
    }

    # API → FastAPI
    location /api/ {
        proxy_pass http://bridge_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Upload endpoint — 큰 파일 허용 (최대 105MB: 비디오)
    location /api/upload {
        client_max_body_size 105M;
        proxy_pass http://bridge_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # Admin — IP 제한 (배포 시 실제 관리자 IP로 교체)
    location /admin {
        allow 127.0.0.1;
        # allow YOUR_OFFICE_IP;   # ← 배포 시 실제 IP 추가
        deny all;
        proxy_pass http://bridge_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend → Next.js
    location / {
        proxy_pass http://bridge_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (HMR in dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://bridge_frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # robots.txt
    location /robots.txt {
        proxy_pass http://bridge_frontend;
        expires 7d;
    }
}
