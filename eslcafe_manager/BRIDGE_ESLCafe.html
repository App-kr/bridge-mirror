<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIDGE ESLCafe Ad Manager</title>
<style>
:root{
--navy:#111;--blue:#0071e3;--blue2:#0077ed;--green:#34c759;
--bg:#fff;--white:#fff;
--g1:#1d1d1f;--g2:#3a3a3c;--g3:#6e6e73;--g4:#aeaeb2;--g5:#d2d2d7;--g6:#e8e8ed;--g7:#f5f5f7;
--sh:0 1px 3px rgba(0,0,0,.06);--sh2:0 4px 20px rgba(0,0,0,.08);
--r:8px;--rl:12px;--rxl:16px;
--f:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
--mono:'SF Mono','JetBrains Mono','Fira Code',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--g1);font-size:15px;overflow:hidden;height:100vh}
/* TOP */
.top{display:flex;align-items:center;height:52px;background:var(--white);border-bottom:1px solid var(--g6);padding:0 18px;gap:10px}
.top .logo{font-size:16px;font-weight:700;letter-spacing:.3px;color:var(--g1)}.top .logo em{font-style:normal;color:var(--blue)}
.top .sp{flex:1}
.top .ck{font-size:11px;color:var(--g4);font-family:var(--mono);min-width:62px}
.tcountries{display:flex;align-items:center;gap:4px;margin-left:14px}
.tcc{font-size:11px;font-weight:600;color:var(--g3);cursor:pointer;padding:3px 8px;border-radius:6px;transition:.12s;white-space:nowrap;user-select:none;border:1px solid transparent}
.tcc:hover{color:var(--g1);background:var(--g7)}
.tcc.on{color:var(--g1);background:var(--g7);border-color:var(--g5);font-weight:700}
.tcc-sep{font-size:10px;color:var(--g5);user-select:none}
.btn{padding:7px 15px;border:1px solid var(--g5);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.12s;display:inline-flex;align-items:center;gap:5px;background:var(--white);color:var(--g2)}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn:hover{border-color:var(--g4);background:var(--g7)}
.btn-y{background:#ff9500;color:#fff;border-color:#ff9500}.btn-y:hover{background:#ffaa33;border-color:#ffaa33}
.btn-g{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-g:hover{background:var(--blue2);border-color:var(--blue2)}
/* LAYOUT */
.lay{display:flex;height:calc(100vh - 52px)}
/* LEFT */
.lp{width:268px;min-width:220px;background:var(--g7);border-right:1px solid var(--g6);display:flex;flex-direction:column}
.lp .sb{padding:10px 12px;border-bottom:1px solid var(--g6)}
.lp .sb input{width:100%;padding:7px 11px;border:1px solid var(--g5);border-radius:var(--rl);font-size:12px;outline:none;background:var(--white);color:var(--g1)}
.lp .sb input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.1)}
.lp .fc{display:flex;gap:4px;padding:8px 12px;flex-wrap:wrap;border-bottom:1px solid var(--g6)}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--g5);background:var(--white);transition:.12s;user-select:none;color:var(--g2);font-weight:500}
.chip:hover{border-color:var(--blue);color:var(--blue)}.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.lp .jl{flex:1;overflow-y:auto;padding:4px 0}
.sec{font-size:11px;font-weight:600;color:var(--g4);padding:10px 14px 5px;text-transform:uppercase;letter-spacing:.8px}
.ji{display:flex;align-items:center;padding:10px 14px;cursor:pointer;gap:8px;transition:.1s;border-left:3px solid transparent;font-size:13px}
.ji:hover{background:rgba(0,0,0,.04)}.ji.sel{background:rgba(0,113,227,.06);border-left-color:var(--blue)}.ji.pm{border-left-color:#7c3aed}
.ji .jn{font-size:11px;color:var(--blue);font-weight:700;min-width:40px}
.ji .jl2{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--g1)}
.ji .js{font-size:11px;color:var(--g4);white-space:nowrap}
.bd{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;white-space:nowrap}
.bd-h{background:#fff3cd;color:#856404}.bd-on{background:#d1fae5;color:#065f46}.bd-off{background:var(--g6);color:var(--g4)}
/* CENTER */
.cp{flex:1;min-width:400px;display:flex;flex-direction:column;overflow:hidden;background:var(--white);border-right:1px solid var(--g6)}
.tb{display:flex;align-items:center;gap:5px;padding:8px 12px;background:var(--g7);border-bottom:1px solid var(--g6);flex-wrap:wrap}
.tb .btn{padding:5px 11px;font-size:12px}
.tb .sep{width:1px;height:18px;background:var(--g5)}
/* segmented controls */
.us{display:flex;background:var(--g6);border-radius:8px;padding:2px;gap:2px}
.us .uo{padding:4px 12px;font-size:12px;cursor:pointer;border-radius:6px;border:none;background:transparent;color:var(--g3);font-weight:600;transition:.12s}
.us .uo:hover{color:var(--g1)}
.us .uo.on{background:var(--white);color:var(--g1);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.obs{display:flex;background:var(--g6);border-radius:8px;padding:2px;gap:2px;margin-left:auto}
.obs .ol{padding:4px 11px;font-size:12px;cursor:pointer;border-radius:6px;border:none;background:transparent;color:var(--g3);font-weight:600;transition:.12s}
.obs .ol:hover{color:var(--g1)}
.obs .ol.on{background:var(--white);color:var(--g1);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.lyt{display:flex;background:var(--g6);border-radius:8px;padding:2px;gap:2px}
.lyt .ll{padding:4px 11px;font-size:12px;cursor:pointer;border-radius:6px;border:none;background:transparent;color:var(--g3);font-weight:600;transition:.12s}
.lyt .ll:hover{color:var(--g1)}
.lyt .ll.on{background:var(--white);color:var(--g1);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.cb{flex:1;overflow-y:auto;padding:16px}
/* EDIT FORM */
.ef{background:var(--white);border-radius:var(--rl);padding:20px;border:1px solid var(--g6)}
.ef h3{font-size:16px;margin-bottom:14px;color:var(--g1);font-weight:700}
.ef label{display:block;font-size:12px;font-weight:600;color:var(--g3);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.4px}
.ef input,.ef textarea,.ef select{width:100%;padding:8px 11px;border:1px solid var(--g5);border-radius:var(--r);font-size:14px;font-family:var(--f);outline:none;color:var(--g1)}
.ef input:focus,.ef textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.1)}
.ef textarea{min-height:120px;resize:vertical;font-family:var(--mono);font-size:11px;line-height:1.5}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.chks{display:flex;gap:16px;margin-top:8px}
.chks label{display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-size:12px;color:var(--g1);font-weight:normal}
.brow{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.bsv{padding:9px 22px;border:none;border-radius:var(--r);background:var(--blue);color:#fff;cursor:pointer;font-weight:600;font-size:14px}
.bsv:hover{background:var(--blue2)}
.bdl{padding:9px 18px;border:1px solid #ff3b30;border-radius:var(--r);background:var(--white);color:#ff3b30;cursor:pointer;font-size:14px}
.bdl:hover{background:#fff5f5}
/* PLACEHOLDER */
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--g4);gap:12px}
.ph svg{width:64px;height:64px;stroke:var(--g5)}.ph p{font-size:14px}
/* RIGHT */
.rp{width:480px;min-width:360px;flex-shrink:0;background:var(--white);display:flex;flex-direction:column}
.rp .rt{display:flex;border-bottom:1px solid var(--g6);padding:0 12px}
.rp .rx{padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:.12s;color:var(--g3);white-space:nowrap}
.rp .rx:hover{color:var(--g1)}.rp .rx.on{color:var(--g1);border-bottom-color:var(--g1)}
.rp .rn{flex:1;overflow:hidden;display:none;flex-direction:column}.rp .rn.on{display:flex}
.rp .pf{flex:1;border:none;background:var(--white)}
.rp .sa{flex:1;display:flex;flex-direction:column;padding:10px}
.rp .sa textarea{flex:1;font-family:var(--mono);font-size:11px;line-height:1.5;padding:10px;border:1px solid var(--g5);border-radius:var(--r);resize:none}
.rp .sa .ba{margin-top:8px;padding:8px 16px;border:none;border-radius:var(--r);background:var(--blue);color:#fff;cursor:pointer;font-weight:600;font-size:12px;align-self:flex-end}
/* TOAST */
.toast{position:fixed;top:62px;right:16px;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(-10px);transition:.3s;pointer-events:none}
.toast.v{opacity:1;transform:translateY(0)}
.toast-ok{background:#f0fdf4;color:#166534;border:1px solid #86efac}
.toast-er{background:#fff5f5;color:#b91c1c;border:1px solid #fca5a5}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--g5);border-radius:3px}
/* THEME PICKER */
.phwrap{display:flex;flex-direction:column;align-items:center;width:100%;padding:16px;overflow-y:auto;gap:14px}
.phttl{font-size:20px;font-weight:700;color:var(--g1);margin:0}
.phsub{font-size:14px;color:var(--g4);margin:2px 0 0;text-align:center}
/* ABC 세트 탭 */
.ttabs{display:flex;gap:0;margin-top:12px;background:var(--g6);border-radius:10px;padding:3px;width:100%}
.ttab{flex:1;padding:8px 0;font-size:14px;font-weight:600;cursor:pointer;border-radius:8px;background:transparent;color:var(--g3);border:none;transition:.12s;text-align:center}
.ttab:hover{color:var(--g1)}
.ttab.on{background:var(--white);color:var(--g1);box-shadow:0 1px 4px rgba(0,0,0,.1)}
/* 와이드 세로 누적 카드 */
.tgrid{display:flex;flex-direction:column;gap:8px;width:100%}
.tcard{width:100%;display:flex;flex-direction:row;min-height:88px;border:1.5px solid var(--g6);border-radius:12px;cursor:pointer;overflow:hidden;transition:all .12s;background:var(--white)}
.tcard:hover{border-color:var(--g4);box-shadow:var(--sh2)}
.tcard.sel{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.12)}
.tprev{width:160px;flex-shrink:0;min-height:88px;position:relative;overflow:hidden}
.tinfo{flex:1;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:12px;min-width:0}
.tinfo-left{flex:1;min-width:0}
.tname{font-size:15px;font-weight:700;color:var(--g1)}
.tdesc{font-size:12px;color:var(--g3);margin-top:3px;line-height:1.35}
.tchk{display:flex;align-items:center;gap:3px;margin-top:5px;font-size:11px;font-weight:700;color:var(--blue);opacity:0;transition:.15s}
.tcard.sel .tchk{opacity:1}
.tswrow{display:flex;gap:5px;align-items:center;flex-wrap:wrap;max-width:100px;flex-shrink:0}
/* Settings panel */
.tset{width:100%;background:var(--g7);border:1px solid var(--g6);border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.tset-sec{display:flex;flex-direction:column;gap:7px}
.tset-sec.grow{flex:1;min-width:180px}
.tset-row{display:grid;gap:14px;width:100%}
.tset-row.col3{grid-template-columns:1fr 1fr 1fr}
.tset-row.col2{grid-template-columns:1fr 1fr}
.tset-lbl{font-size:11px;font-weight:600;color:var(--g4);text-transform:uppercase;letter-spacing:.7px}
.tset-btns{display:flex;gap:4px;background:var(--g6);padding:3px;border-radius:8px}
.tsb{padding:5px 13px;border:none;border-radius:6px;background:transparent;font-size:13px;cursor:pointer;font-weight:600;color:var(--g3);transition:.12s}
.tsb:hover{color:var(--g1)}
.tsb.on{background:var(--white);color:var(--g1);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.tswatches{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.12s;flex-shrink:0}
.tswatch:hover{transform:scale(1.2)}
.tswatch.on{border-color:#fff;box-shadow:0 0 0 2.5px var(--blue)}
/* Link row */
.tset-link-row{display:flex;flex-direction:column;gap:6px}
.tset-link{display:flex;gap:6px;align-items:center}
.tset-link input{flex:1;padding:9px 13px;border:1px solid var(--g5);border-radius:var(--r);font-size:13px;font-family:var(--mono);outline:none;background:var(--white);color:var(--g1)}
.tset-link input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.1)}
.tset-url-btns{display:flex;gap:5px}
.tub{padding:6px 13px;border:1.5px solid var(--g5);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:var(--white);color:var(--g3);transition:.12s}
.tub:hover{border-color:var(--g4);color:var(--g1)}
.tub.on{background:var(--g1);color:#fff;border-color:var(--g1)}
/* CENTER TABS */
.ctabs{display:flex;align-items:center;background:var(--white);border-bottom:1px solid var(--g6);padding:0 12px;gap:2px}
.ctab{flex:none;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;border-bottom:2px solid transparent;transition:.12s;color:var(--g3);background:none;white-space:nowrap}
.ctab:hover{color:var(--g1)}.ctab.on{color:var(--g1);border-bottom-color:var(--g1)}
/* POST INFO PANEL */
.pinfo{display:flex;flex-direction:column;gap:10px;padding:14px;overflow-y:auto;height:100%;box-sizing:border-box}
.pi-lbl{font-size:10px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.pi-row{display:flex;gap:6px;align-items:flex-start}
.pi-inp{flex:1;padding:7px 10px;border:1px solid var(--g5);border-radius:var(--r);font-size:12px;font-family:var(--f);outline:none;background:#fff;color:var(--g1)}
.pi-inp:focus{border-color:var(--blue)}
.pi-ta{width:100%;padding:8px 10px;border:1px solid var(--g5);border-radius:var(--r);font-size:12px;font-family:var(--f);outline:none;resize:vertical;min-height:58px;box-sizing:border-box}
.pi-ta:focus{border-color:var(--blue)}
.cpbtn{padding:6px 11px;border:1px solid var(--g5);border-radius:var(--r);background:#fff;cursor:pointer;font-size:11px;font-weight:600;color:var(--g2);white-space:nowrap;transition:.12s;display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.cpbtn:hover{border-color:var(--g3);color:var(--g1)}
.cpbtn.pr{background:var(--blue);color:#fff;border-color:var(--blue)}
.cpbtn.pr:hover{background:var(--blue2)}
.cpbtn.sm{padding:4px 9px;font-size:10px}
.titbox{border:1px solid var(--g6);border-radius:var(--r);overflow:hidden;max-height:250px;overflow-y:auto;flex-shrink:0}
.titcard{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-bottom:1px solid var(--g7);cursor:pointer;transition:.1s}
.titcard:hover{background:var(--g7)}.titcard:last-child{border-bottom:none}
.titcard.sel{background:#f0f7ff;border-left:3px solid var(--blue);padding-left:7px}
.titnum{font-size:10px;font-weight:700;color:var(--g4);min-width:18px;margin-top:2px}
.tittxt{flex:1;font-size:11px;color:var(--g1);line-height:1.5}
.pi-fixed{display:grid;grid-template-columns:auto 1fr auto;gap:6px 8px;align-items:center}
.pi-fk{font-size:10px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.pi-fv{padding:6px 10px;border:1px solid var(--g5);border-radius:var(--r);font-size:12px;background:var(--g7);font-family:var(--mono)}
.pi-div{height:1px;background:var(--g6);margin:2px 0}
</style>
</head>
<body>
<div class="top">
  <div class="logo">BRIDGE <em>ESLCafe</em></div>
  <div class="tcountries">
    <span class="tcc on">🇺🇸 US</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇨🇦 Canada</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇬🇧 UK</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇮🇪 Ireland</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇦🇺 Australia</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇳🇿 New Zealand</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇿🇦 SA</span>
  </div>
  <div class="sp"></div>
  <div class="ck" id="clk"></div>
  <button class="btn btn-y" onclick="doShuffle()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>랜덤</button>
  <button class="btn btn-g" onclick="generateAd()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>광고 생성</button>
</div>
<div class="lay">
  <!-- LEFT -->
  <div class="lp">
    <div class="sb"><input type="text" id="sI" placeholder="지역명 / 공고번호 검색..." oninput="renderList()"></div>
    <div class="fc" id="fB"></div>
    <div class="jl" id="jL"></div>
  </div>
  <!-- CENTER -->
  <div class="cp">
    <div class="tb">
      <button class="btn" onclick="addJob()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>+1</button>
      <button class="btn" onclick="addBulk(3)" title="빈 직업 3개 추가">+3</button>
      <button class="btn" onclick="addBulk(5)" title="빈 직업 5개 추가">+5</button>
      <button class="btn" onclick="addBulk(10)" title="빈 직업 10개 추가">+10</button>
      <button class="btn" onclick="copyHtml()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>HTML 복사</button>
      <button class="btn" onclick="openTab()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>새 탭</button>
      <button class="btn" onclick="dlHtml()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>저장 .html</button>
      <div class="sep"></div>
      <button class="btn" onclick="expJ()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>내보내기</button>
      <button class="btn" onclick="impJ()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>가져오기</button>
      <button class="btn" onclick="resetJ()" style="color:#ef4444">초기화</button>
    </div>
    <div class="ctabs">
      <button class="ctab on" data-p="style" onclick="setCTab(this)">스타일</button>
      <button class="ctab" data-p="post" onclick="setCTab(this)">게시 정보</button>
      <div style="flex:1"></div>
      <div class="obs">
        <button class="ol on" data-o="1" onclick="setObs(this)">L1</button>
        <button class="ol" data-o="2" onclick="setObs(this)">L2</button>
        <button class="ol" data-o="3" onclick="setObs(this)">L3</button>
      </div>

var MONTHS={'jan':1,'feb':2,'mar':3,'apr':4,'may':5,'jun':6,'jul':7,'aug':8,'sep':9,'oct':10,'nov':11,'dec':12,'january':1,'february':2,'march':3,'april':4,'june':6,'july':7,'august':8,'september':9,'october':10,'november':11,'december':12};

function smartDate(raw,nm){
  var s=(raw||'').trim();
  if(!s||s.toUpperCase()==='ASAP')return'ASAP';
  if(s.toLowerCase().indexOf('asap')>=0)return s;
  var parts=s.split(/\s*[\/,~&]\s*/);
  var res=[];
  parts.forEach(function(p){
    var k=p.trim().toLowerCase().replace(/[^a-z]/g,'');
    var m=MONTHS[k];
    if(!m){res.push(p.trim());return;}
    res.push(m<=nm?'ASAP':p.trim());
  });
  var seen=false;
  var clean=res.filter(function(r){if(r==='ASAP'){if(seen)return false;seen=true;}return true;});
  if(clean.every(function(r){return r==='ASAP';}))return'ASAP';
  return clean.join(' / ');
}

/* ── Job Quality Parsers ── */
function parseWorkHours(hrs){
  /* "08:30~16:30" → 시간 수 (float) */
  var m=(hrs||'').match(/(\d{1,2}):(\d{2})\s*[~\-]\s*(\d{1,2}):(\d{2})/);
  if(!m)return 8;
  var s=parseInt(m[1])*60+parseInt(m[2]),e=parseInt(m[3])*60+parseInt(m[4]);
  if(e<=s)e+=24*60;
  return(e-s)/60;
}
function parseVacDays(txt){
  /* txt에서 Vacation 줄 파싱 → 일수 (최솟값 기준) */
  var t=txt||'';
  var mw=t.match(/vacation:\s*(\d+)\s*~\s*(\d+)\s*weeks?/i);if(mw)return parseInt(mw[1])*5;
  var mw2=t.match(/vacation:\s*(\d+)\s*weeks?/i);if(mw2)return parseInt(mw2[1])*5;
  var md=t.match(/vacation:\s*(\d+)\s*~\s*(\d+)\s*days?/i);if(md)return parseInt(md[1]);
  var md2=t.match(/vacation:\s*(\d+)\s*days?/i);if(md2)return parseInt(md2[1]);
  return 0;
}
function parseSalMin(sal){
  /* "2.30m-2.80m" → 230 (만원 단위) */
  var m=(sal||'').match(/([\d.]+)m/i);return m?Math.round(parseFloat(m[1])*100):999;
}
function isPopular(j){
  /* 인기 직업: 근무시간 ≤7h 또는 휴가 ≥20일 */
  return parseWorkHours(j.hrs)<=7||parseVacDays(j.txt)>=20;
}
function isExcluded(j){
  /* 광고 제외: 풀근무(≥8h) + 저급여(≤230만) — Premium은 항상 포함 */
  if(j.p)return false;
  return parseWorkHours(j.hrs)>=8&&parseSalMin(j.sal)<=230;
}

/* ── Shuffle + buildOrder ── */
function doShuffle(){buildOrder();_heroCopyIdx=Math.floor(Math.random()*_HERO_COPY.length);renderList();toast('순서 변경됨!','ok');if(lastHtml)generateAd();}

function buildOrder(){
  var act=jobs.filter(function(j){return j.a;}),inact=jobs.filter(function(j){return!j.a;});
  var cands=act.filter(function(j){return j.p||isPopular(j);});
  var others=act.filter(function(j){return!j.p&&!isPopular(j);});
  /* 셔플: 우수 후보 풀 → 5~6개 선정 */
  for(var i=cands.length-1;i>0;i--){var k=Math.floor(Math.random()*(i+1));var t=cands[i];cands[i]=cands[k];cands[k]=t;}
  var target=Math.floor(Math.random()*2)+5;
  var pm3=cands.slice(0,target),ov=cands.slice(target);
  /* HOT + _pinned 마킹 */
  act.forEach(function(j){j._pinned=false;j.h=false;});
  pm3.forEach(function(j){j.h=true;j._pinned=true;});
  ov.forEach(function(j){j.h=isPopular(j)||j.p;});
  others.forEach(function(j){j.h=isPopular(j)||j.p;});
  /* 전체 active를 한 번 더 셔플 — HOT 직업이 리스트 전반에 고루 분포 */
  var allAct=[].concat(act);
  for(var i=allAct.length-1;i>0;i--){var k=Math.floor(Math.random()*(i+1));var t=allAct[i];allAct[i]=allAct[k];allAct[k]=t;}
  jobs=[].concat(allAct,inact);persist();
}

/* ── Anti-Copy Obfuscation ── */
function rnd(){return Math.random().toString(36).slice(2,6);}
function obfCls(base){
  if(obsLv===1)return base+'-'+rnd();
  if(obsLv===2)return btoa(base+'-'+rnd()).replace(/[=+\/]/g,'').slice(0,10);
  return'x'+rnd()+rnd();
}

function setCurGroup(el,g){
  curGroup=g;
  document.querySelectorAll('.ttab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  buildThemePicker();
}

function setThemeColor(themeId,color){
  curTheme=themeId;
  var ts=TS[themeId];if(!ts)return;
  ts.accent=color;ts.ac_hero='';ts.ac_card='';ts.ac_cta='';
  buildThemePicker();
  renderSettings();
  if(lastHtml)generateAd();
}

function buildThemePicker(){
  var g=document.getElementById('tG');if(!g)return;
  var groupIds=THEME_GROUPS[curGroup]||THEME_GROUPS['A'];
  g.innerHTML=groupIds.map(function(tid){
    var t=THEMES.find(function(x){return x.id===tid;});
    if(!t)return '';
    var sel=(tid===curTheme)?' sel':'';
    var prev=TPREV[tid]?TPREV[tid]():'<div style="background:#eee;height:100%"></div>';
    var ts=TS[tid]||{presets:[]};
    var accentColor=ts.ac_hero||ts.accent||'#1a5ff8';
    var swatches=ts.presets.slice(0,6).map(function(c){
      var brd=(c==='#ffffff')?';outline:1.5px solid #ccc':'';
      var sz=18;
      return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+c+brd+';cursor:pointer;flex-shrink:0;transition:.12s;box-shadow:0 1px 3px rgba(0,0,0,.15)" '
        +'title="'+c+'" '
        +'onclick="event.stopPropagation();setThemeColor(\''+tid+'\',\''+c+'\')" '
        +'onmouseover="this.style.transform=\'scale(1.3)\'" '
        +'onmouseout="this.style.transform=\'\'"></div>';
    }).join('');
    return '<div class="tcard'+sel+'" onclick="setTheme(this,\''+tid+'\')">'
      +'<div class="tprev">'+prev+'</div>'
      +'<div class="tinfo">'
        +'<div class="tinfo-left">'
          +'<div class="tname">'+t.name+'</div>'
          +'<div class="tdesc">'+t.desc+'</div>'
          +'<div class="tchk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="10" height="10"><polyline points="20 6 9 17 4 12"/></svg> 선택됨</div>'
        +'</div>'
        +'<div class="tswrow">'+swatches+'</div>'
      +'</div>'
    +'</div>';
  }).join('');
  renderSettings();
}

function renderSettings(){
  var s=document.getElementById('tSet');if(!s)return;
  var ts=TS[curTheme]||{fs:14,accent:'#1a5ff8',link:'',presets:[]};
  var def=ts.accent||'#1a5ff8';
  var acH=ts.ac_hero||def, acC=ts.ac_card||def, acB=ts.ac_cta||def;
  var fsUi=ts.fs||14, fsB=ts.fs_body||fsUi;
  var prs=ts.presets||[];

  function mkPal(cur,fn){
    /* 흰/검 항상 고정 + 테마 프리셋 8개 */
    var fixed=['#ffffff','#000000'];
    var sw=fixed.map(function(c){
      var brd=(c==='#ffffff')?';border:2px solid var(--g5)':'';
      return '<div class="tswatch'+(cur===c?' on':'')+'" style="background:'+c+brd+'" title="'+c+'" onclick="'+fn+'(\''+c+'\')"></div>';
    }).join('');
    sw+=prs.slice(0,8).map(function(c){
      return '<div class="tswatch'+(cur===c?' on':'')+'" style="background:'+c+'" title="'+c+'" onclick="'+fn+'(\''+c+'\')"></div>';
    }).join('');
    sw+='<input type="color" value="'+cur+'" oninput="'+fn+'(this.value)" style="width:24px;height:24px;padding:1px;border:1px solid var(--g5);border-radius:50%;cursor:pointer;flex-shrink:0">';
    return '<div class="tswatches">'+sw+'</div>';
  }
  function mkFs(cur,fn){
    return '<div class="tset-btns">'+['13:S','14:M','15:L','16:XL'].map(function(x){
      var p=x.split(':');
      return '<button class="tsb'+(cur===parseInt(p[0])?' on':'')+'" onclick="'+fn+'('+p[0]+')">'+p[1]+'</button>';
    }).join('')+'</div>';
  }

  s.innerHTML=
    /* Row 1: 3 independent color sections */
    '<div class="tset-row col3">'
    +'<div class="tset-sec"><div class="tset-lbl">🎨 히어로 색</div>'+mkPal(acH,'setHeroAc')+'</div>'
    +'<div class="tset-sec"><div class="tset-lbl">🃏 카드 색</div>'+mkPal(acC,'setCardAc')+'</div>'
    +'<div class="tset-sec"><div class="tset-lbl">🔲 버튼 색</div>'+mkPal(acB,'setCtaAc')+'</div>'
    +'</div>'
    /* Row 2: 2 font size controls */
    +'<div class="tset-row col2">'
    +'<div class="tset-sec"><div class="tset-lbl">Aa UI 폰트</div>'+mkFs(fsUi,'setFs')+'</div>'
    +'<div class="tset-sec"><div class="tset-lbl">Aa 본문 폰트</div>'+mkFs(fsB,'setBodyFs')+'</div>'
    +'</div>'
    /* Row 3: link + URL mode */
    +'<div class="tset-sec"><div class="tset-lbl">Apply Now 링크</div>'
    +'<div class="tset-link"><input type="text" id="tLinkI" placeholder="직접 입력하거나 아래 버튼 선택..." value="'+(ts.link||'')+'" oninput="setTLink(this.value)"></div>'
    +'<div class="tset-url-btns">'
    +'<button class="tub'+(urlMode==='gform'?' on':'')+'" onclick="setUrlMode(\'gform\')">Google Form</button>'
    +'<button class="tub'+(urlMode==='bridge'?' on':'')+'" onclick="setUrlMode(\'bridge\')">bridgejob.co.kr</button>'
    +'</div></div>';
}

function getThemeCss(){
  var ts=TS[curTheme]||{fs:14,accent:'#1a5ff8'};
  var def=ts.accent||'';
  /* 섹션별 독립 색상 — 비어있으면 마스터 accent 사용 */
  var acH=ts.ac_hero||def;   // 히어로 섹션
  var acC=ts.ac_card||def;   // 카드 섹션
  var acB=ts.ac_cta||def;    // 버튼/CTA
  var heroOv=acH?(
    '.hcta{color:'+acH+'!important}'
    +'.bar p{color:'+acH+'!important}'
  ):'';
  var cardOv=acC?(
    '.ctop::before{background:'+acC+'!important}'
    +'.ctop.prem::before{background:linear-gradient(90deg,'+acC+','+acC+')!important}'
    +'.cjobid{color:'+acC+'!important}'
    +'.iico{color:'+acC+'!important}'
    +'.wnote{border-left-color:'+acC+'!important}'
    +'.wico{color:'+acC+'!important}'
  ):'';
  var ctaOv=acB?(
    '.barbtn{background:'+acB+'!important}'
    +'.pcta{background:'+acB+'!important}'
  ):'';
  var fsUi=ts.fs||14;
  var fsBod=ts.fs_body||fsUi;
  var fsOv='html,body{font-size:'+fsUi+'px}';
  var fsBodOv=fsBod!==fsUi?'.itxt{font-size:'+fsBod+'px!important}.psub{font-size:'+(fsBod-1)+'px!important}':'';
  /* 히어로 폰트 크기 — fs 설정에 비례 스케일 */
  var r=fsUi/14;
  var heroFsOv=''
    +'.hh1{font-size:'+Math.round(46*r)+'px!important}'
    +'.hh2{font-size:'+Math.round(17*r)+'px!important}'
    +'.heyebrow{font-size:'+Math.round(11*r)+'px!important}'
    +'.hql{font-size:'+Math.round(10*r)+'px!important}'
    +'.hbadge{font-size:'+Math.round(15*r)+'px!important}'
    +'.htag{font-size:'+Math.round(12*r)+'px!important}'
    +'.hty-h1{font-size:'+Math.round(64*r)+'px!important}'
    +'.hty-sub{font-size:'+Math.round(16*r)+'px!important}'
    +'.hty-chip{font-size:'+Math.round(12*r)+'px!important}'
    +'.hbd-logo{font-size:'+Math.round(24*r)+'px!important}'
    +'.hbd-stat strong{font-size:'+Math.round(20*r)+'px!important}'
    +'.hbd-chip{font-size:'+Math.round(12*r)+'px!important}'
    +'.hsp-li{font-size:'+Math.round(13*r)+'px!important}'
    +'.hcta{font-size:'+Math.round(16*r)+'px!important;padding:'+Math.round(16*r/16)+'px '+Math.round(52*r/16)+'px!important}';
  return'<style type="text/css">'+_B+(_OV[curTheme]||'')+heroOv+cardOv+ctaOv+fsOv+fsBodOv+heroFsOv+'</style>';
}

  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(v).then(function(){toast('복사됨!','ok');}).catch(function(){_fallbackCopy(v);});
  } else {_fallbackCopy(v);}
}
function _fallbackCopy(v){
  var t=document.createElement('textarea');t.value=v;t.style.position='fixed';t.style.left='-9999px';
  document.body.appendChild(t);t.select();
  try{document.execCommand('copy');toast('복사됨!','ok');}catch(e){toast('복사 실패','er');}
  document.body.removeChild(t);
}

function generateTitlesAI(){
  var key=prompt('Anthropic API Key (sk-ant-...):','');
  if(!key||!key.startsWith('sk-'))return;
  var btn=document.querySelector('[onclick="generateTitlesAI()"]');
  if(btn){btn.textContent='⏳ 생성 중...';btn.disabled=true;}
  var nm=new Date();
  var MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var curM=MN[nm.getMonth()],nxtM=MN[(nm.getMonth()+1)%12];
  var promptTxt='Generate 30 creative, varied job posting titles for a Korean ESL teaching recruitment agency called BRIDGE. Requirements:\n- Each title under 80 characters\n- Mix: some with emojis, some professional, some urgent\n- Vary locations (Seoul, Gyeonggi, Busan, Jeju, nationwide)\n- Vary salary info, start months ('+curM+', '+nxtM+', ASAP)\n- Return ONLY a JSON array of 30 strings, no other text';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2048,messages:[{role:'user',content:promptTxt}]})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error.message);
    var txt=(d.content&&d.content[0]&&d.content[0].text)||'';
    var m=txt.match(/\[[\s\S]*?\]/);if(!m)throw new Error('JSON 없음');
    var titles=JSON.parse(m[0]);if(!Array.isArray(titles)||!titles.length)throw new Error('빈 배열');
    var box=document.getElementById('titList');
    if(box){box.innerHTML=titles.map(function(t,i){
      return '<div class="titcard" onclick="selTitle(this)" data-t="'+encodeURIComponent(t)+'">'
      +'<span class="titnum">'+(i+1)+'</span><span class="tittxt">'+esc(t)+'</span>'
      +'<button class="cpbtn sm" onclick="event.stopPropagation();copyField(decodeURIComponent(this.closest(\'.titcard\').dataset.t))">복사</button>'
      +'</div>';
    }).join('');}
    toast('AI 제목 '+titles.length+'개 생성!','ok');
  }).catch(function(e){
    toast('오류: '+(e.message.indexOf('CORS')>=0||e.message.indexOf('fetch')>=0?'CORS차단-독립파일실행필요':e.message),'er');
  }).finally(function(){if(btn){btn.textContent='🤖 AI 제목 30개 생성';btn.disabled=false;}});
}

/* ── Utils ── */
function toast(m,t){var e=document.getElementById('tst');e.textContent=m;e.className='toast toast-'+t+' v';setTimeout(function(){e.classList.remove('v');},2200);}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ── Anti-Copy: zero-width character injection ──
   Inserts invisible Unicode chars between every character.
   Copied text becomes garbage while looking normal on screen. */
var ZW=['\u200B','\u200C','\u200D','\uFEFF','\u2060','\u180E'];
function zw(s){
  if(!s)return s;
  var out='';
  for(var i=0;i<s.length;i++){
    out+=s[i];
    if(i<s.length-1&&s[i]!==' '&&s[i+1]!==' '){
      out+=ZW[Math.floor(Math.random()*ZW.length)];
    }
  }
  return out;
}
/* Protected escape: HTML-escape + zero-width injection */
function pesc(s){return zw(esc(s));}
