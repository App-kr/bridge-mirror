<title>BRIDGE ESLCafe Ad Manager</title>
<style>
:root{
--navy:#003366;--blue:#1a5ff8;--blue2:#1248c8;--green:#05b97d;
--bg:#f0f2f5;--white:#fff;
--g1:#1a1d25;--g2:#3d4150;--g3:#6b7280;--g4:#9ca3af;--g5:#d1d5db;--g6:#e5e7eb;--g7:#f3f4f6;
--sh:0 1px 4px rgba(0,0,0,.07);--sh2:0 4px 16px rgba(0,0,0,.09);
--r:8px;--rl:12px;--rxl:16px;
--f:Pretendard,-apple-system,'Segoe UI',sans-serif;
--mono:'JetBrains Mono','Fira Code',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--g1);font-size:13px;overflow:hidden;height:100vh}
/* TOP */
.top{display:flex;align-items:center;height:50px;background:var(--navy);color:#fff;padding:0 16px;gap:10px}
.top .logo{font-size:17px;font-weight:800;letter-spacing:1.5px}.top .logo em{font-style:normal;color:var(--green)}
.top .tabs{display:flex;gap:2px;margin-left:14px}
.top .t{padding:7px 14px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;background:rgba(255,255,255,.1);transition:.15s}
.top .t:hover{background:rgba(255,255,255,.2)}.top .t.on{background:#fff;color:var(--navy);font-weight:600}
.top .sp{flex:1}
.top .ck{font-size:12px;opacity:.7;font-family:var(--mono);min-width:62px}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-y{background:#f59e0b;color:#78350f}.btn-y:hover{background:#fbbf24}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{background:#04a06d}
/* LAYOUT */
.lay{display:flex;height:calc(100vh - 50px)}
/* LEFT */
.lp{width:340px;min-width:300px;background:var(--white);border-right:1px solid var(--g6);display:flex;flex-direction:column}
.lp .sb{padding:10px 12px;border-bottom:1px solid var(--g6)}
.lp .sb input{width:100%;padding:7px 10px;border:1px solid var(--g5);border-radius:var(--r);font-size:12px;outline:none}
.lp .sb input:focus{border-color:var(--blue)}
.lp .fc{display:flex;gap:4px;padding:8px 12px;flex-wrap:wrap;border-bottom:1px solid var(--g6)}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--g5);background:var(--white);transition:.15s;user-select:none}
.chip:hover{border-color:var(--blue);color:var(--blue)}.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.lp .jl{flex:1;overflow-y:auto;padding:6px 0}
.sec{font-size:10px;font-weight:700;color:var(--g4);padding:8px 12px 4px;text-transform:uppercase;letter-spacing:.6px}
.ji{display:flex;align-items:center;padding:7px 12px;cursor:pointer;gap:7px;transition:.1s;border-left:3px solid transparent;font-size:12px}
.ji:hover{background:var(--g7)}.ji.sel{background:#eff6ff;border-left-color:var(--blue)}.ji.pm{border-left-color:#7c3aed}
.ji .jn{font-size:11px;color:var(--blue);font-weight:600;min-width:38px}
.ji .jl2{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ji .js{font-size:11px;color:var(--g3);white-space:nowrap}
.bd{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;white-space:nowrap}
.bd-h{background:#fef3c7;color:#92400e}.bd-on{background:#d1fae5;color:#065f46}.bd-off{background:var(--g6);color:var(--g4)}
/* CENTER */
.cp{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.tb{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--white);border-bottom:1px solid var(--g6);flex-wrap:wrap}
.tb .btn{padding:5px 10px;border:1px solid var(--g5);background:var(--white);border-radius:var(--r);font-size:11px}
.tb .btn:hover{border-color:var(--blue);color:var(--blue)}
.tb .sep{width:1px;height:18px;background:var(--g5)}
.us{display:flex;border:1px solid var(--g5);border-radius:var(--r);overflow:hidden}
.us .uo{padding:4px 10px;font-size:11px;cursor:pointer;background:var(--white);transition:.15s;border:none}
.us .uo.on{background:var(--blue);color:#fff}
.obs{display:flex;border:1px solid var(--g5);border-radius:var(--r);overflow:hidden;margin-left:auto}
.obs .ol{padding:4px 10px;font-size:11px;cursor:pointer;background:var(--white);transition:.15s;border:none}
.obs .ol.on{background:#7c3aed;color:#fff}
.cb{flex:1;overflow-y:auto;padding:16px}
/* EDIT FORM */
.ef{background:var(--white);border-radius:var(--rl);padding:20px;box-shadow:var(--sh)}
.ef h3{font-size:14px;margin-bottom:12px;color:var(--navy)}
.ef label{display:block;font-size:11px;font-weight:600;color:var(--g3);margin:10px 0 4px}
.ef input,.ef textarea,.ef select{width:100%;padding:7px 10px;border:1px solid var(--g5);border-radius:var(--r);font-size:12px;font-family:var(--f);outline:none}
.ef input:focus,.ef textarea:focus{border-color:var(--blue)}
.ef textarea{min-height:120px;resize:vertical;font-family:var(--mono);font-size:11px;line-height:1.5}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.chks{display:flex;gap:16px;margin-top:8px}
.chks label{display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-size:12px;color:var(--g1);font-weight:normal}
.brow{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.bsv{padding:8px 20px;border:none;border-radius:var(--r);background:var(--blue);color:#fff;cursor:pointer;font-weight:600;font-size:12px}
.bdl{padding:8px 16px;border:1px solid #ef4444;border-radius:var(--r);background:var(--white);color:#ef4444;cursor:pointer;font-size:12px}
.bdl:hover{background:#fef2f2}
/* PLACEHOLDER */
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--g4);gap:12px}
.ph svg{width:64px;height:64px;stroke:var(--g5)}.ph p{font-size:14px}
/* RIGHT */
.rp{width:460px;min-width:400px;background:var(--white);border-left:1px solid var(--g6);display:flex;flex-direction:column}
.rp .rt{display:flex;border-bottom:1px solid var(--g6)}
.rp .rx{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;color:var(--g3)}
.rp .rx:hover{color:var(--g1)}.rp .rx.on{color:var(--blue);border-bottom-color:var(--blue)}
.rp .rn{flex:1;overflow:hidden;display:none;flex-direction:column}.rp .rn.on{display:flex}
.rp .pf{flex:1;border:none;background:var(--white)}
.rp .sa{flex:1;display:flex;flex-direction:column;padding:10px}
.rp .sa textarea{flex:1;font-family:var(--mono);font-size:11px;line-height:1.5;padding:10px;border:1px solid var(--g5);border-radius:var(--r);resize:none}
.rp .sa .ba{margin-top:8px;padding:8px 16px;border:none;border-radius:var(--r);background:var(--green);color:#fff;cursor:pointer;font-weight:600;font-size:12px;align-self:flex-end}
/* TOAST */
.toast{position:fixed;top:58px;right:16px;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(-10px);transition:.3s;pointer-events:none}
.toast.v{opacity:1;transform:translateY(0)}
.toast-ok{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.toast-er{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--g5);border-radius:3px}
</style>
</head>

var jobs=[],selIdx=-1,curF='all',urlMode='gform',obsLv=1,lastHtml='';

/* ── smartDate: 현재 월 기준 지난 달 → ASAP ── */
var MONTHS={'jan':1,'feb':2,'mar':3,'apr':4,'may':5,'jun':6,'jul':7,'aug':8,'sep':9,'oct':10,'nov':11,'dec':12,'january':1,'february':2,'march':3,'april':4,'june':6,'july':7,'august':8,'september':9,'october':10,'november':11,'december':12};

function smartDate(raw,nm){
  var s=(raw||'').trim();
  if(!s||s.toUpperCase()==='ASAP')return'ASAP';
  if(s.toLowerCase().indexOf('asap')>=0)return s;
  var parts=s.split(/\s*[\/,~&]\s*/);
  var res=[];
  parts.forEach(function(p){
    var k=p.trim().toLowerCase().replace(/[^a-z]/g,'');
    var m=MONTHS[k];
    if(!m){res.push(p.trim());return;}
    res.push(m<=nm?'ASAP':p.trim());
  });
  var seen=false;
  var clean=res.filter(function(r){if(r==='ASAP'){if(seen)return false;seen=true;}return true;});
  if(clean.every(function(r){return r==='ASAP';}))return'ASAP';
  return clean.join(' / ');
}

/* ── Init ── */
function init(){
  var sv=localStorage.getItem('bridge-esl-jobs');
  if(sv){try{jobs=JSON.parse(sv);}catch(e){jobs=JSON.parse(JSON.stringify(DEFAULT_JOBS));}}
  else{jobs=JSON.parse(JSON.stringify(DEFAULT_JOBS));}
  renderList();startClock();setupFilters();
}

function persist(){localStorage.setItem('bridge-esl-jobs',JSON.stringify(jobs));}

/* ── Clock ── */
function startClock(){var e=document.getElementById('clk');(function t(){var n=new Date();e.textContent=n.toLocaleTimeString('en-GB',{hour12:false});setTimeout(t,1000);})();}

/* ── Filters ── */
var FILTERS=[{k:'all',l:'All'},{k:'premium',l:'Premium'},{k:'hot',l:'HOT'},{k:'seoul',l:'Seoul'},{k:'gg',l:'GG+IC'},{k:'etc',l:'Others'}];
function setupFilters(){
  var b=document.getElementById('fB');
  b.innerHTML=FILTERS.map(function(f){return'<span class="chip'+(f.k==='all'?' on':'')+'" data-f="'+f.k+'">'+f.l+'</span>';}).join('');
  b.querySelectorAll('.chip').forEach(function(c){c.addEventListener('click',function(){b.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});c.classList.add('on');curF=c.dataset.f;renderList();});});
}

/* ── Job List ── */
function renderList(){
  var el=document.getElementById('jL'),q=document.getElementById('sI').value.toLowerCase().trim();
  var fl=jobs.filter(function(j){
    if(q&&j.l.toLowerCase().indexOf(q)<0&&j.id.indexOf(q)<0)return false;
    if(curF==='premium')return j.p;if(curF==='hot')return j.h;
    if(curF==='seoul')return j.r==='seoul';if(curF==='gg')return j.r==='gg';if(curF==='etc')return j.r==='etc';
    return true;
  });
  var pm=fl.filter(function(j){return j.p;}),rs=fl.filter(function(j){return!j.p;}),h='';
  if(pm.length){h+='<div class="sec">Premium</div>';pm.forEach(function(j){h+=jiH(j);});}
  if(rs.length){h+='<div class="sec">Jobs</div>';rs.forEach(function(j){h+=jiH(j);});}
  if(!pm.length&&!rs.length)h='<div style="padding:20px;text-align:center;color:var(--g4)">No jobs found</div>';
  el.innerHTML=h;
  el.querySelectorAll('.ji').forEach(function(it){it.addEventListener('click',function(){selJob(jobs.findIndex(function(j){return j.id===it.dataset.j;}));});});
}
function jiH(j){
  var i=jobs.indexOf(j),s=i===selIdx?' sel':'',p=j.p?' pm':'';
  return'<div class="ji'+s+p+'" data-j="'+j.id+'"><span class="jn">#'+j.id+'</span><span class="jl2">'+esc(j.l)+'</span><span class="js">'+esc(j.sal)+'</span>'+(j.h?'<span class="bd bd-h">HOT</span>':'')+(j.a?'<span class="bd bd-on">ON</span>':'<span class="bd bd-off">OFF</span>')+'</div>';
}

function selJob(i){
  selIdx=i;var j=jobs[i];if(!j)return;
  document.getElementById('ePh').style.display='none';document.getElementById('eF').style.display='block';
  document.getElementById('eT').textContent='Edit #'+j.id+' \u2014 '+j.l;

function saveJob(){

  j.hsg=document.getElementById('eHs').value.trim();j.p=document.getElementById('ePm').checked;

/* ── Shuffle + buildOrder ── */
function doShuffle(){buildOrder();renderList();toast('Shuffled!','ok');if(lastHtml)generateAd();}

function buildOrder(){
  var act=jobs.filter(function(j){return j.a;}),inact=jobs.filter(function(j){return!j.a;});
  var pm=act.filter(function(j){return j.p;}).slice(0,3);
  var ov=act.filter(function(j){return j.p;}).slice(3);
  var rest=act.filter(function(j){return!j.p;});
  var sh=[].concat(ov,rest);
  for(var i=sh.length-1;i>0;i--){var k=Math.floor(Math.random()*(i+1));var t=sh[i];sh[i]=sh[k];sh[k]=t;}
  /* HOT: 프리미엄=항상, 나머지=4번째마다 */
  pm.forEach(function(j){j.h=true;});
  sh.forEach(function(j,idx){j.h=(idx%4===3);});
  jobs=[].concat(pm,sh,inact);persist();
}

/* ── Anti-Copy Obfuscation ── */
function rnd(){return Math.random().toString(36).slice(2,6);}
function obfCls(base){
  if(obsLv===1)return base+'-'+rnd();
  if(obsLv===2)return btoa(base+'-'+rnd()).replace(/[=+\/]/g,'').slice(0,10);
  return'x'+rnd()+rnd();
}

      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 24px;">'+grid+'</div>'
      +'<div style="margin-top:14px;text-align:center;">'
      +'<a href="'+link+'" target="_blank" style="display:block;width:fit-content;margin:0 auto;background:#1a5ff8;color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;">Apply for this position</a>'
      +'</div></div></div>';

    /* Apply bar every 5 cards */
    if((idx+1)%5===0&&idx<active.length-1){
      cards+='<div class="'+c.ap+'" style="background:linear-gradient(135deg,#003366,#1a5ff8);border-radius:12px;padding:20px 24px;margin-bottom:16px;text-align:center;">'
        +'<p style="color:#fff;font-size:16px;font-weight:600;margin:0 0 10px;">Ready to start your teaching career in Korea?</p>'
        +'<a href="'+link+'" target="_blank" style="display:block;width:fit-content;margin:0 auto;background:#05b97d;color:#fff;padding:10px 28px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:700;">APPLY NOW</a></div>';
    }
  });

  /* STEPS */
  var steps=[{i:I.form,t:'Submit Application',d:'Complete our simple online form'},{i:I.chat,t:'Video Call with BRIDGE',d:'Brief interview to understand your goals'},{i:I.handshake,t:'School Interview',d:'We arrange interviews with matched schools'},{i:I.badge,t:'Start Teaching!',d:'Begin your adventure in Korea'}];
  var stH=steps.map(function(s,i){
    return'<div style="flex:1;text-align:center;padding:16px;"><div style="width:48px;height:48px;margin:0 auto 10px;background:rgba(26,95,248,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#1a5ff8;">'+s.i+'</div><div style="font-size:14px;font-weight:600;color:#111;margin-bottom:4px;">'+s.t+'</div><div style="font-size:12px;color:#6b7280;">'+s.d+'</div>'+(i<3?'<div style="margin-top:10px;color:#d1d5db;font-size:20px;">&#8594;</div>':'')+'</div>';
  }).join('');

  /* BENEFITS */
  var bens=[{i:I.plane,t:'Round-trip Airfare'},{i:I.home,t:'Housing Provided or Allowance'},{i:I.shield,t:'National Health Insurance'},{i:I.sun,t:'Paid Vacation'},{i:I.key,t:'Visa Sponsorship (E-2)'},{i:I.star,t:'Severance Pay (1 month)'},{i:I.grow,t:'Career Growth Opportunities'},{i:I.users,t:'Dedicated Support Team'},{i:I.badge,t:'National Pension'},{i:I.academic,t:'Professional Development'}];
  var benH=bens.map(function(b){return'<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f8fafc;border-radius:8px;"><div style="width:20px;height:20px;color:#1a5ff8;flex-shrink:0;">'+b.i+'</div><span style="font-size:13px;color:#1a1d25;">'+b.t+'</span></div>';}).join('');

  var tags='#TeachInKorea #ESLJobs #KoreaJobs #TeachAbroad #TEFL #ESL #BRIDGE #EnglishTeacher #KoreaTeaching #LivingInKorea';

  lastHtml='<div class="'+c.w+'" style="max-width:720px;margin:0 auto;font-family:-apple-system,\'Segoe UI\',sans-serif;color:#1a1d25;">'
  +cssBlock

  /* HERO */
  +'<div class="'+c.h+'" style="background:linear-gradient(135deg,#003366 0%,#1a5ff8 100%);border-radius:16px;padding:40px 32px;text-align:center;margin-bottom:20px;">'
  +'<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:2px;margin-bottom:8px;">GOV\'T-CERTIFIED AGENCY</div>'
  +'<div style="font-size:32px;font-weight:800;color:#fff;letter-spacing:1px;margin-bottom:4px;">BRIDGE</div>'
  +'<div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;">Teach English in Korea</div>'
  +'<div style="font-size:14px;color:rgba(255,255,255,.85);margin-bottom:20px;">The right school, the right support &mdash; your next chapter starts here</div>'
  +'<div style="margin-bottom:20px;"><a href="'+link+'" target="_blank" style="display:block;width:fit-content;margin:0 auto;background:#05b97d;color:#fff;padding:12px 32px;border-radius:8px;text-decoration:none;font-size:15px;font-weight:700;">APPLY NOW &rarr;</a></div>'
  +'<div style="margin-bottom:16px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;">'+whoH+'</div>'
  +'<div style="font-size:11px;color:rgba(255,255,255,.5);word-spacing:4px;">'+tags+'</div></div>'

  /* CARDS */
  +cards

  /* HOW TO APPLY */
  +'<div style="background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);">'
  +'<h3 style="font-size:18px;font-weight:700;text-align:center;margin:0 0 20px;color:#003366;">HOW TO APPLY</h3>'
  +'<div style="display:flex;gap:8px;">'+stH+'</div></div>'

  /* WHAT YOU GET */
  +'<div style="background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);">'
  +'<h3 style="font-size:18px;font-weight:700;text-align:center;margin:0 0 16px;color:#003366;">WHAT YOU GET</h3>'
  +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+benH+'</div></div>'

  /* FOOTER */
  +'<div class="'+c.ft+'" style="background:#003366;border-radius:12px;padding:24px;text-align:center;">'
  +'<div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;">BRIDGE</div>'
  +'<div style="font-size:12px;color:rgba(255,255,255,.7);margin-bottom:12px;">Government-Certified Employment Agency | Connecting Teachers with Korea</div>'
  +'<a href="'+link+'" target="_blank" style="display:block;width:fit-content;margin:0 auto;background:#05b97d;color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;">START YOUR APPLICATION</a>'
  +'<div style="margin-top:12px;font-size:11px;color:rgba(255,255,255,.4);">&copy; BRIDGE. All rights reserved.</div></div>'

  +'</div>';

  updPreview(lastHtml);
  document.getElementById('srcT').value=lastHtml;
  toast(active.length+' jobs generated (L'+obsLv+')','ok');
}

/* ── Preview ── */
function updPreview(h){
  var f=document.getElementById('pvF');
  f.srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:16px;background:#f0f2f5;font-family:-apple-system,"Segoe UI",sans-serif;}</style></head><body>'+h+'</body></html>';
}
function applySrc(){lastHtml=document.getElementById('srcT').value;updPreview(lastHtml);toast('Applied','ok');}

/* ── Right tabs ── */
function sRT(el){
  document.querySelectorAll('.rx').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.rn').forEach(function(p){p.classList.remove('on');});
  el.classList.add('on');document.getElementById('r'+el.dataset.p).classList.add('on');
}

/* ── URL / Obfuscation ── */
function setUrl(el){document.querySelectorAll('.uo').forEach(function(o){o.classList.remove('on');});el.classList.add('on');urlMode=el.dataset.u;if(lastHtml)generateAd();}
function setObs(el){document.querySelectorAll('.ol').forEach(function(o){o.classList.remove('on');});el.classList.add('on');obsLv=parseInt(el.dataset.o);if(lastHtml)generateAd();}

/* ── Actions ── */
function copyHtml(){if(!lastHtml){toast('Generate first!','er');return;}navigator.clipboard.writeText(lastHtml).then(function(){toast('HTML copied!','ok');}).catch(function(){toast('Copy failed','er');});}

function openTab(){
  if(!lastHtml){toast('Generate first!','er');return;}
  var full='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>BRIDGE ESLCafe Ad</title><style>body{margin:0;padding:20px;background:#f0f2f5;font-family:-apple-system,"Segoe UI",sans-serif;}.cb{position:fixed;top:0;left:0;right:0;background:#003366;padding:10px 20px;text-align:center;z-index:100;}.cb button{background:#05b97d;color:#fff;border:none;padding:8px 20px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;margin:0 4px;}</style></head><body style="padding-top:52px;"><div class="cb"><button onclick="doCopy()">Copy HTML</button></div>'+lastHtml+'<'+'script>function doCopy(){var b=document.querySelector(".cb");var cl=document.body.cloneNode(true);cl.removeChild(cl.querySelector(".cb"));var sc=cl.querySelector("script");if(sc)sc.remove();navigator.clipboard.writeText(cl.innerHTML.trim()).then(function(){alert("Copied!")}).catch(function(){alert("Failed")});}</'+'script></body></html>';
  var blob=new Blob([full],{type:'text/html'});window.open(URL.createObjectURL(blob),'_blank');
}

function dlHtml(){
  if(!lastHtml){toast('Generate first!','er');return;}
  var full='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>BRIDGE ESLCafe Ad</title><style>body{margin:0;padding:20px;background:#f0f2f5;font-family:-apple-system,"Segoe UI",sans-serif;}</style></head><body>'+lastHtml+'</body></html>';
  var blob=new Blob([full],{type:'text/html'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='BRIDGE_ESLCafe_'+new Date().toISOString().slice(0,10)+'.html';a.click();URL.revokeObjectURL(a.href);toast('Downloaded!','ok');
}

function expJ(){var b=new Blob([JSON.stringify(jobs,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='bridge_eslcafe_jobs.json';a.click();URL.revokeObjectURL(a.href);toast('Exported','ok');}
function impJ(){document.getElementById('fIn').click();}
function hdImp(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!Array.isArray(d))throw 0;jobs=d;persist();selIdx=-1;renderList();toast('Imported '+d.length+' jobs','ok');}catch(e){toast('Invalid JSON','er');}};r.readAsText(f);e.target.value='';}
function resetJ(){if(!confirm('Reset all to default?'))return;jobs=JSON.parse(JSON.stringify(DEFAULT_JOBS));selIdx=-1;document.getElementById('eF').style.display='none';document.getElementById('ePh').style.display='flex';persist();renderList();toast('Reset done','ok');}

/* ── Utils ── */
function toast(m,t){var e=document.getElementById('tst');e.textContent=m;e.className='toast toast-'+t+' v';setTimeout(function(){e.classList.remove('v');},2200);}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ── Boot ── */
init();
</script>
