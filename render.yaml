services:
  - type: web
    name: bridge-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api_server:app --host 0.0.0.0 --port $PORT --workers 1"
    healthCheckPath: /health
    # autoDeploy: 사용자 요청에 따라 main push 시 자동 배포 활성화
    # 자동 복원 트리거가 매 재배포마다 작동해서 master.db 영구 보존
    autoDeploy: true
    branch: main
    envVars:
      - key: ENV
        value: production
      - key: DB_PATH
        value: master.db
      - key: CORS_ORIGINS
        value: https://bridgejob.co.kr,https://www.bridgejob.co.kr,https://bridge-chi-lime.vercel.app
      - key: ADMIN_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BRIDGE_FIELD_KEY
        sync: false
      - key: BRIDGE_DB_PATH
        value: master.db
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NAVER_SMTP_USER
        value: bridgejobkr@naver.com
      - key: NAVER_SMTP_PASS
        sync: false
      # Google Drive DB 자동 복원용 (base64 인코딩된 service account JSON) — 레거시
      - key: GCP_SA_JSON_B64
        sync: false
      # ─────────────────────────────────────────────────────────────────────
      # ★ 필수: Drive OAuth 토큰 (재배포 시 master.db 자동 복원 트리거)
      # 미설정 시 Render 재배포 = 데이터 영구 손실 (sheet_prefs/candidates/jobs 등)
      # 등록 방법:
      #   1) 로컬에서 `python tools/db_persist.py status` 실행 (토큰 자동 발급)
      #   2) drive_oauth_token.json 전체 내용을 Render 대시보드 →
      #      Environment Variables → DRIVE_OAUTH_TOKEN_JSON 값으로 붙여넣기
      #   3) Manual Deploy → 자동 복원 검증 (로그에 "Drive 자동 복원 성공")
      - key: DRIVE_OAUTH_TOKEN_JSON
        sync: false
    # disk: 미연결 (Render free plan 미지원 — 유료 플랜 업그레이드 필요)
