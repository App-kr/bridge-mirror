services:
  - type: web
    name: bridge-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn api_server:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --max-requests 1000 --max-requests-jitter 50 --preload"
    healthCheckPath: /health
    autoDeploy: false
    branch: main
    buildFilter:
      paths:
        - api_server.py
        - requirements.txt
        - render.yaml
    envVars:
      - key: ENV
        value: production
      - key: DB_PATH
        value: /data/master.db
      - key: CORS_ORIGINS
        value: https://bridgejob.co.kr,https://www.bridgejob.co.kr,https://bridge-chi-lime.vercel.app
      - key: ADMIN_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BRIDGE_FIELD_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    disk:
      name: bridge-data
      mountPath: /data
      sizeGB: 1
