services:
  - type: web
    name: bridge-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api_server:app --host 0.0.0.0 --port $PORT --workers 1"
    healthCheckPath: /health
    autoDeploy: false
    branch: main
    envVars:
      - key: ENV
        value: production
      - key: DB_PATH
        value: master.db
      - key: CORS_ORIGINS
        value: https://bridgejob.co.kr,https://www.bridgejob.co.kr,https://bridge-chi-lime.vercel.app
      - key: ADMIN_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BRIDGE_FIELD_KEY
        sync: false
      - key: BRIDGE_DB_PATH
        value: master.db
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NAVER_SMTP_USER
        value: bridgejobkr@naver.com
      - key: NAVER_SMTP_PASS
        sync: false
      # Google Drive DB 자동 복원용 (base64 인코딩된 service account JSON)
      # 설정 방법: `certutil -encode gcp_service_account.json tmp.b64` 로 base64 생성 후
      #           Render 대시보드 → Environment → GCP_SA_JSON_B64 값으로 붙여넣기
      - key: GCP_SA_JSON_B64
        sync: false
    # disk: 미연결 (Render free plan 미지원 — 유료 플랜 업그레이드 필요)
