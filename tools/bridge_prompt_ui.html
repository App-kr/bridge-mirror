<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BRIDGE — Prompt Generator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', 'Inter', 'Segoe UI', sans-serif;
  background: #0d0d0d;
  color: #e8e8e8;
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

/* ── SIDEBAR ─────────────────────────────── */
.sidebar {
  width: 240px;
  min-width: 240px;
  background: #141414;
  border-right: 1px solid #272727;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-inner {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar-inner::-webkit-scrollbar { display: none; }

.logo-wrap {
  padding: 20px 18px 16px;
  border-bottom: 1px solid #272727;
}
.logo-name {
  font-size: 16px; font-weight: 800;
  letter-spacing: 0.12em; text-transform: uppercase; color: #fff;
}
.logo-desc {
  font-size: 13px; color: #999; margin-top: 4px; letter-spacing: 0.02em;
}

.s-section { padding: 16px 18px; border-bottom: 1px solid #1e1e1e; }
.s-label {
  font-size: 12px; font-weight: 700; color: #777;
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px;
}

/* Target */
.t-group { display: flex; flex-direction: column; gap: 3px; }
.t-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 7px;
  cursor: pointer; color: #888; transition: all .12s;
  user-select: none; font-size: 15px;
}
.t-item:hover { background: #1c1c1c; color: #ccc; }
.t-item.on { background: #222; color: #fff; }
.t-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #3a3a3a; flex-shrink: 0; transition: background .12s;
}
.t-item.on .t-dot { background: #fff; }
.t-item.on-early .t-dot { background: #f59e0b; }
.t-item.on-early { color: #fff; }
.t-item.on-middle .t-dot { background: #3b82f6; }
.t-item.on-middle { color: #fff; }

/* Count */
.count-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 14px; }
.count-n { font-size: 42px; font-weight: 200; color: #fff; line-height: 1; }
.count-unit { font-size: 14px; color: #888; }
input[type=range] {
  width: 100%; -webkit-appearance: none;
  height: 3px; background: #333; border-radius: 2px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: #fff; cursor: pointer;
  box-shadow: 0 0 0 3px rgba(255,255,255,.1);
}

/* Generate — big colorful button */
.gen-btn {
  display: block; width: calc(100% - 36px);
  margin: 16px 18px;
  padding: 15px 0;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: #fff;
  font-size: 15px; font-weight: 800;
  border: none; border-radius: 10px; cursor: pointer;
  letter-spacing: 0.06em; text-transform: uppercase;
  transition: all .15s;
  box-shadow: 0 4px 20px rgba(99,102,241,.35);
}
.gen-btn:hover {
  background: linear-gradient(135deg, #2563eb, #4f46e5);
  box-shadow: 0 6px 24px rgba(99,102,241,.5);
  transform: translateY(-1px);
}
.gen-btn:active { transform: scale(.98); box-shadow: none; }
.gen-btn.loading {
  opacity: .6; pointer-events: none;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
}

/* Services — visible buttons */
.svc-list { display: flex; flex-direction: column; gap: 4px; }
.svc-item {
  display: flex; align-items: center;
  padding: 9px 11px; border-radius: 7px;
  font-size: 14px; font-weight: 600; color: #bbb;
  text-decoration: none; cursor: pointer;
  transition: all .12s; gap: 10px;
  border: 1px solid #2a2a2a; background: #181818;
}
.svc-item:hover { color: #fff; border-color: #444; background: #222; }
.svc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.svc-imagefx .svc-dot { background: #4285f4; }
.svc-midjourney .svc-dot { background: #bbb; }
.svc-dalle .svc-dot { background: #10a37f; }
.svc-ideogram .svc-dot { background: #a855f7; }

/* Advanced */
.adv-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 10px; border-radius: 7px; cursor: pointer;
  font-size: 14px; color: #999; transition: all .12s;
  background: none; border: none; width: 100%;
}
.adv-toggle:hover { color: #ddd; background: #1c1c1c; }
.adv-toggle span { font-size: 11px; }
.adv-body { display: none; margin-top: 8px; }
.adv-body.open { display: block; }
.adv-field { margin-bottom: 10px; }
.adv-field-label { font-size: 13px; color: #999; margin-bottom: 5px; }
select.adv-select {
  width: 100%; padding: 8px 10px;
  background: #1a1a1a; color: #ddd;
  border: 1px solid #333; border-radius: 6px;
  font-size: 13px; outline: none; cursor: pointer;
}
select.adv-select:focus { border-color: #555; }

/* Bottom */
.sidebar-bottom { padding: 16px 18px; border-top: 1px solid #222; margin-top: auto; }
.copy-all-btn {
  display: block; width: 100%; padding: 10px;
  background: #1c1c1c; color: #ccc;
  border: 1px solid #333; border-radius: 7px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all .12s;
  margin-bottom: 16px;
}
.copy-all-btn:hover { color: #fff; border-color: #555; background: #252525; }

.stats-row { display: flex; gap: 12px; }
.stat-item { flex: 1; }
.stat-n { font-size: 20px; font-weight: 300; color: #ddd; }
.stat-d { font-size: 12px; color: #666; margin-top: 2px; }

/* ── MAIN ─────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #0d0d0d; }

.topbar {
  height: 50px; border-bottom: 1px solid #1e1e1e;
  display: flex; align-items: center;
  padding: 0 22px; gap: 12px; flex-shrink: 0;
}
.topbar-label { font-size: 14px; color: #999; }
.topbar-badge {
  font-size: 13px; color: #bbb;
  background: #1a1a1a; border: 1px solid #2e2e2e;
  padding: 2px 10px; border-radius: 9px;
}
.topbar-spacer { flex: 1; }
.topbar-hint { font-size: 13px; color: #666; }

.output {
  flex: 1; overflow-y: auto;
  padding: 18px 22px; display: flex; flex-direction: column; gap: 12px;
}
.output::-webkit-scrollbar { width: 4px; }
.output::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 2px; }

.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
}
.empty-state p:first-child { font-size: 17px; color: #555; font-weight: 600; }
.empty-state p:last-child { font-size: 14px; color: #3a3a3a; }

/* ── PROMPT CARD ──────────────────────────── */
.pcard {
  background: #141414; border: 1px solid #272727;
  border-radius: 10px; overflow: hidden;
  animation: up .22s ease both; border-left-width: 3px;
}
.pcard.early { border-left-color: #f59e0b; }
.pcard.middle { border-left-color: #3b82f6; }
@keyframes up {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}

.pcard-head {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid #1e1e1e;
}
.pcard-idx { font-size: 14px; color: #777; font-weight: 700; width: 22px; flex-shrink: 0; }
.pcard-info { flex: 1; min-width: 0; }
.pcard-place {
  font-size: 15px; font-weight: 700; color: #f0f0f0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pcard-sub { font-size: 13px; color: #999; margin-top: 2px; }
.badge {
  font-size: 11px; font-weight: 700; letter-spacing: .04em;
  text-transform: uppercase; padding: 4px 9px; border-radius: 5px; flex-shrink: 0;
}
.badge.early { background: rgba(245,158,11,.18); color: #fbbf24; }
.badge.middle { background: rgba(59,130,246,.2); color: #60a5fa; }

/* Action buttons — colorful & prominent */
.pcard-actions { display: flex; gap: 6px; flex-shrink: 0; }
.pa-btn {
  padding: 7px 13px; border-radius: 7px;
  font-size: 13px; font-weight: 700;
  border: none; cursor: pointer; transition: all .12s;
  white-space: nowrap;
}
.pa-btn.copy-btn  { background: #2d3748; color: #e2e8f0; }
.pa-btn.copy-btn:hover  { background: #4a5568; color: #fff; }
.pa-btn.copy-btn.copied { background: #276749; color: #9ae6b4; }
.pa-btn.fx   { background: #1e3a5f; color: #63b3ed; }
.pa-btn.fx:hover   { background: #2b4c7e; color: #90cdf4; }
.pa-btn.dl   { background: #1a3a2a; color: #68d391; }
.pa-btn.dl:hover   { background: #236038; color: #9ae6b4; }
.pa-btn.ig   { background: #2d1b69; color: #b794f4; }
.pa-btn.ig:hover   { background: #44337a; color: #d6bcfa; }

/* Card body — two column */
.pcard-body { display: flex; border-bottom: 1px solid #1a1a1a; }

.prompt-en {
  flex: 3; padding: 14px 16px;
  border-right: 1px solid #1a1a1a; min-width: 0;
}
.pcard-text {
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
  font-size: 13px; line-height: 1.8; color: #c8c8c8;
  white-space: pre-wrap; word-break: break-word;
}

/* Korean description panel */
.prompt-ko {
  width: 220px; min-width: 220px;
  padding: 14px 15px;
  background: #111;
  display: flex; flex-direction: column; gap: 10px;
}
.ko-title {
  font-size: 11px; font-weight: 700; color: #555;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 2px;
}
.ko-row { display: flex; flex-direction: column; gap: 2px; }
.ko-label { font-size: 11px; color: #555; }
.ko-val { font-size: 13px; color: #ccc; font-weight: 500; line-height: 1.4; }
.ko-val.early-c { color: #fbbf24; }
.ko-val.middle-c { color: #60a5fa; }
.ko-divider { height: 1px; background: #1e1e1e; margin: 2px 0; }

.pcard-foot {
  padding: 8px 16px 10px;
  display: flex; align-items: center; gap: 10px;
}
.pcard-foot-line { flex: 1; height: 1px; background: #1e1e1e; }
.expand-btn {
  font-size: 13px; color: #777; background: none; border: none;
  cursor: pointer; padding: 0; transition: color .12s; font-weight: 500;
}
.expand-btn:hover { color: #ccc; }

/* Toast */
.toast {
  position: fixed; bottom: 22px; right: 22px;
  background: #1c1c1c; color: #f0f0f0;
  border: 1px solid #333; border-radius: 9px;
  padding: 11px 18px; font-size: 14px; font-weight: 600;
  opacity: 0; transform: translateY(5px);
  transition: all .18s; pointer-events: none; z-index: 9999;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
}
.toast.on { opacity: 1; transform: translateY(0); }
</style>
</head>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="sidebar-inner">

  <div class="logo-wrap">
    <div class="logo-name">Bridge</div>
    <div class="logo-desc">Image Prompt Generator</div>
  </div>

  <!-- Target -->
  <div class="s-section">
    <div class="s-label">Target</div>

      <div class="t-item on" data-val="all" onclick="setTarget(this)">
        <div class="t-dot"></div> All
      </div>
      <div class="t-item" data-val="early" onclick="setTarget(this)">
        <div class="t-dot"></div> Early Childhood
      </div>
      <div class="t-item" data-val="middle" onclick="setTarget(this)">
        <div class="t-dot"></div> Middle / High School
      </div>
    </div>
  </div>

  <!-- Count -->
  <div class="s-section">
    <div class="s-label">Count</div>
    <div class="count-row">
      <div class="count-n" id="countN">5</div>
      <div class="count-unit">prompts</div>
    </div>
    <input type="range" id="countSlider" min="1" max="12" value="5"
      oninput="document.getElementById('countN').textContent=this.value">
  </div>

  <!-- Generate -->
  <button class="gen-btn" id="genBtn" onclick="runGenerate()">Generate</button>

  <!-- Services -->
  <div class="s-section">
    <div class="s-label">Open in</div>
    <div class="svc-list">
      <a class="svc-item svc-imagefx" href="https://labs.google/fx/tools/image-fx" target="_blank">
        <div class="svc-dot"></div> ImageFX
      </a>
      <a class="svc-item svc-midjourney" href="https://www.midjourney.com/" target="_blank">
        <div class="svc-dot"></div> Midjourney
      </a>
      <a class="svc-item svc-dalle" href="https://chatgpt.com/" target="_blank">
        <div class="svc-dot"></div> DALL·E 3
      </a>
      <a class="svc-item svc-ideogram" href="https://ideogram.ai/" target="_blank">
        <div class="svc-dot"></div> Ideogram
      </a>
    </div>
  </div>

  <!-- Advanced -->
  <div class="s-section">
    <button class="adv-toggle" onclick="toggleAdv()">
      Advanced <span id="advArrow">▾</span>
    </button>
    <div class="adv-body" id="advBody">
      <div class="adv-field">
        <div class="adv-field-label">Background</div>
        <select class="adv-select" id="bgFilter">
          <option value="">Any</option>
          <optgroup label="Early Childhood" id="earlyOpts"></optgroup>
          <optgroup label="Middle / High" id="middleOpts"></optgroup>
        </select>
      </div>
      <div class="adv-field">
        <div class="adv-field-label">Instructor gender</div>
        <select class="adv-select" id="genderFilter">
          <option value="">Any</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
    </div>
  </div>

</div><!-- /sidebar-inner -->

<div class="sidebar-bottom">
  <button class="copy-all-btn" onclick="copyAll()">Copy all prompts</button>
  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-n" id="s-rules">744</div>
      <div class="stat-d">rules</div>
    </div>
    <div class="stat-item">
      <div class="stat-n">∞</div>
      <div class="stat-d">combinations</div>
    </div>
    <div class="stat-item">
      <div class="stat-n" id="s-gen">0</div>
      <div class="stat-d">generated</div>
    </div>
  </div>
</div>

</div><!-- /sidebar -->

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <span class="topbar-label">Prompts</span>
    <span class="topbar-badge" id="topCount">0</span>
    <div class="topbar-spacer"></div>
    <span class="topbar-hint">Copy prompt → paste into image AI</span>
  </div>
  <div class="output" id="output">
    <div class="empty-state" id="emptyState">
      <p>No prompts yet</p>
      <p>Set options and click Generate</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ============================================================
// UNIQUENESS ENGINE
// ============================================================
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

const RACE_KO={
  'White':'백인','Black':'흑인','Latino':'라틴계','Latina':'라틴계',
  'South Asian':'남아시아계','East Asian':'동아시아계','Middle Eastern':'중동계',
  'Southeast Asian':'동남아시아계','Mixed-race':'혼혈',
  'Native American':'원주민계','Pacific Islander':'태평양계'
};

// Generate a batch where every prompt has a UNIQUE place
function generateBatch(count, targetMode){
  const earlyShuffled = shuffle(PLACES_EARLY);
  const middleShuffled = shuffle(PLACES_MIDDLE);
  const rgShuffled = shuffle(INSTRUCTOR_RG);
  // Also shuffle secondary dims to avoid runs of same instructor
  const hairShuffled = shuffle(HAIR);
  const clothingShuffled = shuffle(CLOTHING);
  const poseShuffled = shuffle(POSES);
  const exprShuffled = shuffle(EXPRESSIONS);

  let earlyIdx=0, middleIdx=0, rgIdx=0, hairIdx=0, clothIdx=0, poseIdx=0, exprIdx=0;

  // Build target distribution
  let targets;
  if(targetMode==='all'){
    targets=[];
    for(let i=0;i<count;i++) targets.push(i%2===0?'early':'middle');
    shuffle(targets); // inline shuffle
    targets=shuffle(targets);
  } else {
    targets=Array.from({length:count},()=>targetMode);
  }

  const genderFilter=document.getElementById('genderFilter').value;
  const bgFilterVal=document.getElementById('bgFilter').value;

  return targets.map(t=>{
    const isEarly=t==='early';
    let place;
    if(bgFilterVal){
      const pool=isEarly?PLACES_EARLY:PLACES_MIDDLE;
      place=pool.find(p=>p.n===bgFilterVal)||pick(isEarly?earlyShuffled:middleShuffled);
    } else {
      const pool=isEarly?earlyShuffled:middleShuffled;
      const idx=isEarly?earlyIdx++:middleIdx++;
      place=pool[idx%pool.length];
    }

    const rg=rgShuffled[rgIdx++%rgShuffled.length];
    const [race,gender]=rg;
    const finalGender=genderFilter||gender;

    const hair=hairShuffled[hairIdx++%hairShuffled.length];
    const clothing=clothingShuffled[clothIdx++%clothingShuffled.length];
    const pose=poseShuffled[poseIdx++%poseShuffled.length];
    const expression=exprShuffled[exprIdx++%exprShuffled.length];
    const age=pick(AGES);

    // All other dims fully random
    const floor=pick(FLOORS);
    const wall=pick(WALLS);
    const ceiling=pick(CEILINGS);
    const lighting=pick(LIGHTING);
    const students=pick(isEarly?STUDENTS_EARLY:STUDENTS_MIDDLE);
    const bokeh=pick(BOKEH);
    const camera=pick(CAMERAS);
    const grade=pick(GRADES);
    const prop=pick(PROPS);
    const season=pick(SEASONS);
    const mood=pick(MOODS);
    const quality=pick(QUALITY);
    const composition=pick(COMPOSITION);

    const raceKo = RACE_KO[race]||race;
    const genderKo = finalGender==='male'?'남성':'여성';

    // English prompt — for copying into AI tools
    const text=
`Photorealistic 4K editorial documentary photograph. Candid, unposed — a real classroom moment, not a photoshoot.

SETTING: ${place.d}. ${floor}. ${wall}. ${ceiling}. ${prop}.

COMPOSITION: ${composition}. The full classroom environment must be clearly visible. Both instructor and students are naturally distributed within the space.

TIME & ATMOSPHERE: ${season}. ${lighting}. Mood: ${mood}.

SCENE: A ${race} ${finalGender} instructor (${age}, ${hair}, ${clothing}) ${pose}. ${expression}. The instructor is naturally present within the room — not posed for camera, not isolated in the foreground.

STUDENTS: ${students}. All students are Korean. They are actively engaged in the lesson — not simply blurred background decoration. ${bokeh}.

IMPORTANT: This is a natural, candid documentary shot. No studio-style subject isolation. No artificial foreground/background separation. Instructor and students share the same genuine classroom moment.

TEXT OVERLAY: ${BRIDGE_TEXT}

TECHNICAL: ${camera}. Color grade: ${grade}. ${quality}. Aspect ratio 16:9. Award-winning editorial education photography. NO other text, watermarks, or logos besides the BRIDGE label.`;

    // Korean display text — shown in UI
    const koText=
`포토리얼리스틱 4K 에디토리얼 다큐멘터리 사진
연출 없는 실제 수업 장면 — 자연스럽고 솔직한 한 컷.

◆ 배경·장소
${place.n}. ${floor}. ${wall}. ${ceiling}. ${prop}.

◆ 구도·앵글
${composition}. 교실 전체 환경이 충분히 보여야 함. 강사와 학생이 공간 안에 자연스럽게 배치.

◆ 시간 및 분위기
${season}. 조명: ${lighting}. 분위기: ${mood}.

◆ 수업 장면 (${raceKo} ${genderKo} 강사)
${age}, ${hair}, ${clothing} 착용. ${pose}. ${expression}. 카메라를 의식하지 않고 수업에 완전히 몰입한 모습.

◆ 한국인 학생들
${students}. 학생들은 모두 한국인. 배경 흐림 처리의 소품이 아니라 수업에 적극 참여 중인 모습. ${bokeh}.

◆ 핵심 요구사항
스튜디오식 인물 분리 없음. 인위적 전경/배경 분리 없음. 강사와 학생이 같은 공간·같은 순간을 공유.

◆ 텍스트 오버레이
사진 좌측 중앙에 'BRIDGE' 글자를 깔끔한 흰색 산세리프체로 표시. 배경·그림자·효과 없음. 다른 텍스트·로고 없음.

◆ 카메라·기술 설정
${camera}. 색감: ${grade}. ${quality}. 화면비 16:9.`;

    return {
      target: t,
      targetLabel: isEarly?'Early Childhood':'Middle / High',
      place: place.n,
      instructor: `${raceKo} ${genderKo}`,
      text,
      koText,
      ko: {
        target: isEarly?'유치·초등 대상':'중·고등 대상',
        place: place.n,
        instructor: (RACE_KO[race]||race)+' '+(finalGender==='male'?'남성':'여성'),
        composition: composition.split(' — ')[0].trim(),
        lighting: lighting.length>38 ? lighting.slice(0,38)+'…' : lighting,
        grade: grade.split(' — ')[0].split(' with ')[0].trim(),
        mood: mood.split(' — ')[0].trim(),
        season: season.split(',')[0].split('—')[0].trim(),
      },
    };
  });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggle(btn,i){
  const pre=document.getElementById(`pt${i}`);
  const open=pre.classList.toggle('open');
  pre.classList.toggle('collapsed',!open);
  btn.textContent=open?'collapse':'expand';
}

// clipboard: works on file:// (fallback to execCommand)
function clipCopy(text){
  if(navigator.clipboard && window.isSecureContext){
    return navigator.clipboard.writeText(text);
  }
  return new Promise(resolve=>{
    const ta=document.createElement('textarea');
    ta.value=text;
    ta.style.cssText='position:fixed;top:0;left:0;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    resolve();
  });
}

function copyOne(btn,i){
  clipCopy(prompts[i].text).then(()=>{
    btn.textContent='Copied!';
    btn.classList.add('copied');
    toast('Copied to clipboard');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
  });
}

const SVC={
  fx:'https://labs.google/fx/tools/image-fx',
  dl:'https://chatgpt.com/',
  ig:'https://ideogram.ai/',
};
function openSvc(svc,i){
  clipCopy(prompts[i].text).then(()=>{
    toast('Prompt copied — paste it into the page');
  });
  window.open(SVC[svc],'_blank');
}

function copyAll(){
  if(!prompts.length){toast('Generate prompts first');return;}
  const all=prompts.map((p,i)=>`[${i+1}] ${p.targetLabel} — ${p.place}\n${p.text}`).join('\n\n---\n\n');
  clipCopy(all).then(()=>toast(prompts.length+' prompts copied'));
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('on');
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('on'),2200);
}

function init(){
  const earlyGrp=document.getElementById('earlyOpts');
  const middleGrp=document.getElementById('middleOpts');
  PLACES_EARLY.forEach(p=>{
    const o=document.createElement('option');
    o.value=p.n; o.textContent=p.n; earlyGrp.appendChild(o);
  });
  PLACES_MIDDLE.forEach(p=>{
    const o=document.createElement('option');
    o.value=p.n; o.textContent=p.n; middleGrp.appendChild(o);
  });
  // count rules
  const total=[FLOORS,WALLS,CEILINGS,LIGHTING,INSTRUCTOR_RG,HAIR,CLOTHING,
    POSES,EXPRESSIONS,AGES,PLACES_EARLY,PLACES_MIDDLE,
    STUDENTS_EARLY,STUDENTS_MIDDLE,BOKEH,CAMERAS,COMPOSITION,GRADES,
    PROPS,SEASONS,MOODS,QUALITY].reduce((s,a)=>s+a.length,0);
  document.getElementById('s-rules').textContent=total;
}
init();
