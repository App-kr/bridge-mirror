<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIDGE ESLCafe Ad Manager</title>
<style>
:root{
--navy:#003366;--blue:#1a5ff8;--blue2:#1248c8;--green:#05b97d;
--bg:#f0f2f5;--white:#fff;
--g1:#1a1d25;--g2:#3d4150;--g3:#6b7280;--g4:#9ca3af;--g5:#d1d5db;--g6:#e5e7eb;--g7:#f3f4f6;
--sh:0 1px 4px rgba(0,0,0,.07);--sh2:0 4px 16px rgba(0,0,0,.09);
--r:8px;--rl:12px;--rxl:16px;
--f:Pretendard,-apple-system,'Segoe UI',sans-serif;
--mono:'JetBrains Mono','Fira Code',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f);background:var(--bg);color:var(--g1);font-size:13px;overflow:hidden;height:100vh}
/* TOP */
.top{display:flex;align-items:center;height:50px;background:var(--navy);color:#fff;padding:0 16px;gap:10px}
.top .logo{font-size:17px;font-weight:800;letter-spacing:1.5px}.top .logo em{font-style:normal;color:var(--green)}
.top .tabs{display:flex;gap:2px;margin-left:14px}
.top .t{padding:7px 14px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;background:rgba(255,255,255,.1);transition:.15s}
.top .t:hover{background:rgba(255,255,255,.2)}.top .t.on{background:#fff;color:var(--navy);font-weight:600}
.top .sp{flex:1}
.top .ck{font-size:12px;opacity:.7;font-family:var(--mono);min-width:62px}
.tcountries{display:flex;align-items:center;gap:5px;margin-left:18px}
.tcc{font-size:11px;font-weight:600;color:rgba(255,255,255,.55);cursor:pointer;padding:3px 7px;border-radius:5px;transition:.15s;white-space:nowrap;user-select:none}
.tcc:hover{color:#fff;background:rgba(255,255,255,.1)}
.tcc.on{color:#fff;background:rgba(255,255,255,.18);font-weight:700}
.tcc-sep{font-size:10px;color:rgba(255,255,255,.25);user-select:none}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-y{background:#f59e0b;color:#78350f}.btn-y:hover{background:#fbbf24}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{background:#04a06d}
/* LAYOUT */
.lay{display:flex;height:calc(100vh - 50px)}
/* LEFT */
.lp{width:280px;min-width:240px;background:var(--white);border-right:1px solid var(--g6);display:flex;flex-direction:column}
.lp .sb{padding:10px 12px;border-bottom:1px solid var(--g6)}
.lp .sb input{width:100%;padding:7px 10px;border:1px solid var(--g5);border-radius:var(--r);font-size:12px;outline:none}
.lp .sb input:focus{border-color:var(--blue)}
.lp .fc{display:flex;gap:4px;padding:8px 12px;flex-wrap:wrap;border-bottom:1px solid var(--g6)}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--g5);background:var(--white);transition:.15s;user-select:none}
.chip:hover{border-color:var(--blue);color:var(--blue)}.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.lp .jl{flex:1;overflow-y:auto;padding:6px 0}
.sec{font-size:12px;font-weight:700;color:var(--g4);padding:11px 16px 6px;text-transform:uppercase;letter-spacing:.6px}
.ji{display:flex;align-items:center;padding:11px 16px;cursor:pointer;gap:9px;transition:.1s;border-left:3px solid transparent;font-size:14px}
.ji:hover{background:var(--g7)}.ji.sel{background:#eff6ff;border-left-color:var(--blue)}.ji.pm{border-left-color:#7c3aed}
.ji .jn{font-size:12px;color:var(--blue);font-weight:600;min-width:40px}
.ji .jl2{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ji .js{font-size:12px;color:var(--g3);white-space:nowrap}
.bd{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;white-space:nowrap}
.bd-h{background:#fef3c7;color:#92400e}.bd-on{background:#d1fae5;color:#065f46}.bd-off{background:var(--g6);color:var(--g4)}
/* CENTER */
.cp{width:680px;min-width:540px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.tb{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--white);border-bottom:1px solid var(--g6);flex-wrap:wrap}
.tb .btn{padding:5px 10px;border:1px solid var(--g5);background:var(--white);border-radius:var(--r);font-size:11px}
.tb .btn:hover{border-color:var(--blue);color:var(--blue)}
.tb .sep{width:1px;height:18px;background:var(--g5)}
.us{display:flex;border:1px solid var(--g5);border-radius:var(--r);overflow:hidden}
.us .uo{padding:4px 10px;font-size:11px;cursor:pointer;background:var(--white);transition:.15s;border:none}
.us .uo.on{background:var(--blue);color:#fff}
.obs{display:flex;border:1px solid var(--g5);border-radius:var(--r);overflow:hidden;margin-left:auto}
.obs .ol{padding:4px 10px;font-size:11px;cursor:pointer;background:var(--white);transition:.15s;border:none}
.obs .ol.on{background:#7c3aed;color:#fff}
.cb{flex:1;overflow-y:auto;padding:16px}
/* EDIT FORM */
.ef{background:var(--white);border-radius:var(--rl);padding:20px;box-shadow:var(--sh)}
.ef h3{font-size:14px;margin-bottom:12px;color:var(--navy)}
.ef label{display:block;font-size:11px;font-weight:600;color:var(--g3);margin:10px 0 4px}
.ef input,.ef textarea,.ef select{width:100%;padding:7px 10px;border:1px solid var(--g5);border-radius:var(--r);font-size:12px;font-family:var(--f);outline:none}
.ef input:focus,.ef textarea:focus{border-color:var(--blue)}
.ef textarea{min-height:120px;resize:vertical;font-family:var(--mono);font-size:11px;line-height:1.5}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.chks{display:flex;gap:16px;margin-top:8px}
.chks label{display:inline-flex;align-items:center;gap:4px;cursor:pointer;font-size:12px;color:var(--g1);font-weight:normal}
.brow{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.bsv{padding:8px 20px;border:none;border-radius:var(--r);background:var(--blue);color:#fff;cursor:pointer;font-weight:600;font-size:12px}
.bdl{padding:8px 16px;border:1px solid #ef4444;border-radius:var(--r);background:var(--white);color:#ef4444;cursor:pointer;font-size:12px}
.bdl:hover{background:#fef2f2}
/* PLACEHOLDER */
.ph{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--g4);gap:12px}
.ph svg{width:64px;height:64px;stroke:var(--g5)}.ph p{font-size:14px}
/* RIGHT */
.rp{flex:1;min-width:480px;background:var(--white);border-left:1px solid var(--g6);display:flex;flex-direction:column}
.rp .rt{display:flex;border-bottom:1px solid var(--g6)}
.rp .rx{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;color:var(--g3)}
.rp .rx:hover{color:var(--g1)}.rp .rx.on{color:var(--blue);border-bottom-color:var(--blue)}
.rp .rn{flex:1;overflow:hidden;display:none;flex-direction:column}.rp .rn.on{display:flex}
.rp .pf{flex:1;border:none;background:var(--white)}
.rp .sa{flex:1;display:flex;flex-direction:column;padding:10px}
.rp .sa textarea{flex:1;font-family:var(--mono);font-size:11px;line-height:1.5;padding:10px;border:1px solid var(--g5);border-radius:var(--r);resize:none}
.rp .sa .ba{margin-top:8px;padding:8px 16px;border:none;border-radius:var(--r);background:var(--green);color:#fff;cursor:pointer;font-weight:600;font-size:12px;align-self:flex-end}
/* TOAST */
.toast{position:fixed;top:58px;right:16px;padding:10px 20px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(-10px);transition:.3s;pointer-events:none}
.toast.v{opacity:1;transform:translateY(0)}
.toast-ok{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.toast-er{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--g5);border-radius:3px}
/* THEME PICKER */
.phwrap{display:flex;flex-direction:column;align-items:center;width:100%;padding:16px;overflow-y:auto;gap:14px}
.phttl{font-size:14px;font-weight:700;color:var(--g1);margin:0}
.phsub{font-size:11px;color:var(--g4);margin:0;text-align:center}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%}
.tcard{border:2px solid var(--g5);border-radius:14px;cursor:pointer;overflow:hidden;transition:all .15s;background:var(--white)}
.tcard:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--sh2)}
.tcard.sel{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,95,248,.15)}
.tprev{height:110px;position:relative;overflow:hidden}
.tinfo{padding:9px 11px 11px}
.tname{font-size:13px;font-weight:700;color:var(--g1)}
.tdesc{font-size:11px;color:var(--g3);margin-top:3px;line-height:1.4}
.tchk{display:flex;align-items:center;gap:3px;margin-top:5px;font-size:10px;font-weight:700;color:var(--blue);opacity:0;transition:.15s}
.tcard.sel .tchk{opacity:1}
/* Settings panel */
.tset{width:100%;background:var(--g7);border:1px solid var(--g6);border-radius:12px;padding:12px 14px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start}
.tset-sec{display:flex;flex-direction:column;gap:6px}
.tset-sec.grow{flex:1;min-width:180px}
.tset-lbl{font-size:11px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.6px}
.tset-btns{display:flex;gap:5px}
.tsb{padding:5px 14px;border:1px solid var(--g5);border-radius:6px;background:var(--white);font-size:13px;cursor:pointer;font-weight:600;color:var(--g2);transition:.12s}
.tsb:hover{border-color:var(--blue);color:var(--blue)}
.tsb.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.tswatches{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.tswatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.12s;flex-shrink:0}
.tswatch:hover{transform:scale(1.18)}
.tswatch.on{border-color:#fff;box-shadow:0 0 0 2px var(--blue)}
.tset-link{display:flex;gap:6px;align-items:center}
.tset-link input{flex:1;padding:6px 11px;border:1px solid var(--g5);border-radius:6px;font-size:12px;font-family:var(--mono);outline:none;background:#fff}
.tset-link input:focus{border-color:var(--blue)}
/* CENTER TABS */
.ctabs{display:flex;align-items:center;background:var(--white);border-bottom:1px solid var(--g6);padding:0 10px;gap:4px}
.ctab{flex:none;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;border-bottom:2px solid transparent;transition:.15s;color:var(--g3);background:none;white-space:nowrap}
.ctab:hover{color:var(--g1)}.ctab.on{color:var(--blue);border-bottom-color:var(--blue)}
/* POST INFO PANEL */
.pinfo{display:flex;flex-direction:column;gap:10px;padding:14px 14px;overflow-y:auto;height:100%;box-sizing:border-box}
.pi-lbl{font-size:10px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.pi-row{display:flex;gap:6px;align-items:flex-start}
.pi-inp{flex:1;padding:7px 10px;border:1px solid var(--g5);border-radius:var(--r);font-size:12px;font-family:var(--f);outline:none;background:#fff}
.pi-inp:focus{border-color:var(--blue)}
.pi-ta{width:100%;padding:8px 10px;border:1px solid var(--g5);border-radius:var(--r);font-size:12px;font-family:var(--f);outline:none;resize:vertical;min-height:58px;box-sizing:border-box}
.pi-ta:focus{border-color:var(--blue)}
.cpbtn{padding:6px 11px;border:1px solid var(--g5);border-radius:var(--r);background:#fff;cursor:pointer;font-size:11px;font-weight:600;color:var(--g2);white-space:nowrap;transition:.12s;display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.cpbtn:hover{border-color:var(--blue);color:var(--blue)}
.cpbtn.pr{background:var(--blue);color:#fff;border-color:var(--blue)}
.cpbtn.pr:hover{background:var(--blue2)}
.cpbtn.sm{padding:4px 9px;font-size:10px}
.titbox{border:1px solid var(--g6);border-radius:var(--r);overflow:hidden;max-height:250px;overflow-y:auto;flex-shrink:0}
.titcard{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-bottom:1px solid var(--g7);cursor:pointer;transition:.1s}
.titcard:hover{background:#f8f9ff}.titcard:last-child{border-bottom:none}
.titcard.sel{background:#eff6ff;border-left:3px solid var(--blue);padding-left:7px}
.titnum{font-size:10px;font-weight:700;color:var(--g4);min-width:18px;margin-top:2px}
.tittxt{flex:1;font-size:11px;color:var(--g1);line-height:1.5}
.pi-fixed{display:grid;grid-template-columns:auto 1fr auto;gap:6px 8px;align-items:center}
.pi-fk{font-size:10px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.pi-fv{padding:6px 10px;border:1px solid var(--g5);border-radius:var(--r);font-size:12px;background:#f9fafb;font-family:var(--mono)}
.pi-div{height:1px;background:var(--g6);margin:2px 0}
</style>
</head>
<body>
<div class="top">
  <div class="logo">BRIDGE <em>ESLCafe</em></div>
  <div class="tcountries">
    <span class="tcc on">🇺🇸 US</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇨🇦 Canada</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇬🇧 UK</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇮🇪 Ireland</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇦🇺 Australia</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇳🇿 New Zealand</span>
    <span class="tcc-sep">·</span>
    <span class="tcc">🇿🇦 SA</span>
  </div>
  <div class="sp"></div>
  <div class="ck" id="clk"></div>
  <button class="btn btn-y" onclick="doShuffle()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>Random</button>
  <button class="btn btn-g" onclick="generateAd()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Generate Ad</button>
</div>
<div class="lay">
  <!-- LEFT -->
  <div class="lp">
    <div class="sb"><input type="text" id="sI" placeholder="Search location / Job ID..." oninput="renderList()"></div>
    <div class="fc" id="fB"></div>
    <div class="jl" id="jL"></div>
  </div>
  <!-- CENTER -->
  <div class="cp">
    <div class="tb">
      <button class="btn" onclick="addJob()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>+1</button>
      <button class="btn" onclick="addBulk(3)" title="빈 직업 3개 추가">+3</button>
      <button class="btn" onclick="addBulk(5)" title="빈 직업 5개 추가">+5</button>
      <button class="btn" onclick="addBulk(10)" title="빈 직업 10개 추가">+10</button>
      <button class="btn" onclick="copyHtml()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy HTML</button>
      <button class="btn" onclick="openTab()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>New Tab</button>
      <button class="btn" onclick="dlHtml()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Save .html</button>
      <div class="sep"></div>
      <button class="btn" onclick="expJ()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Export</button>
      <button class="btn" onclick="impJ()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>Import</button>
      <button class="btn" onclick="resetJ()" style="color:#ef4444">Reset</button>
    </div>
    <div class="ctabs">
      <button class="ctab on" data-p="style" onclick="setCTab(this)">🎨 Style</button>
      <button class="ctab" data-p="post" onclick="setCTab(this)">📋 Post Info</button>
      <div style="flex:1"></div>
      <div class="sep" style="height:18px;width:1px;background:var(--g5);margin:auto 4px"></div>
      <div class="us">
        <button class="uo on" data-u="gform" onclick="setUrl(this)">Google Form</button>
        <button class="uo" data-u="bridge" onclick="setUrl(this)">bridgejob.co.kr</button>
      </div>
      <div class="obs">
        <button class="ol on" data-o="1" onclick="setObs(this)">L1</button>
        <button class="ol" data-o="2" onclick="setObs(this)">L2</button>
        <button class="ol" data-o="3" onclick="setObs(this)">L3</button>
      </div>
    </div>
    <div class="cb" id="cB">
      <div class="phwrap" id="ePh">
        <div class="tset" id="tSet"></div>
        <div><div class="phttl">Choose Ad Style</div><div class="phsub">Pick a template &mdash; then click Generate Ad</div></div>
        <div class="tgrid" id="tG"></div>
      </div>
      <div class="ef" id="eF" style="display:none">
        <h3 id="eT">Edit Job</h3>
        <div class="r2"><div><label>Job ID</label><input id="eId"></div><div><label>Location</label><input id="eLo"></div></div>
        <div class="r3"><div><label>Region</label><select id="eRg"><option value="seoul">Seoul</option><option value="gg">GG+Incheon</option><option value="etc">Others</option></select></div><div><label>Salary</label><input id="eSa"></div><div><label>Start Date</label><input id="eDt"></div></div>
        <div class="r2"><div><label>Hours</label><input id="eHr"></div><div><label>Housing</label><input id="eHs"></div></div>
        <div class="chks"><label><input type="checkbox" id="ePm"> Premium</label><label><input type="checkbox" id="eHo"> HOT</label><label><input type="checkbox" id="eAc"> Active</label></div>
        <label>Details</label><textarea id="eTx"></textarea>
        <div class="brow"><button class="bdl" onclick="delJob()">Delete</button><button class="bsv" onclick="saveJob()">Save</button></div>
      </div>
      <div id="cPost" style="display:none;height:100%;overflow:hidden"></div>
    </div>
  </div>
  <!-- RIGHT -->
  <div class="rp">
    <div class="rt">
      <div class="rx on" data-p="pv" onclick="sRT(this)">Preview</div>
      <div class="rx" data-p="sc" onclick="sRT(this)">Source</div>
    </div>
    <div class="rn on" id="rpv"><iframe class="pf" id="pvF"></iframe></div>
    <div class="rn" id="rsc"><div class="sa"><textarea id="srcT" placeholder="Generated HTML source..."></textarea><button class="ba" onclick="applySrc()">Apply</button></div></div>
  </div>
</div>
<div class="toast" id="tst"></div>
<input type="file" id="fIn" accept=".json" style="display:none" onchange="hdImp(event)">

<script>
/* ════════════════════════════════════════════
   BRIDGE ESLCafe Ad Manager — v6
   ════════════════════════════════════════════ */

var APPLY_GFORM='https://docs.google.com/forms/d/e/1FAIpQLSf3zwNSEb00ErLIOTLH4YwnQr4AhmzewXYG8xISgZKOpzMimg/viewform?usp=header';

var jobs=[],selIdx=-1,curF='all',urlMode='gform',obsLv=1,lastHtml='',curTheme='classic';

/* ── smartDate: 현재 월 기준 지난 달 → ASAP ── */
var MONTHS={'jan':1,'feb':2,'mar':3,'apr':4,'may':5,'jun':6,'jul':7,'aug':8,'sep':9,'oct':10,'nov':11,'dec':12,'january':1,'february':2,'march':3,'april':4,'june':6,'july':7,'august':8,'september':9,'october':10,'november':11,'december':12};

function smartDate(raw,nm){
  var s=(raw||'').trim();
  if(!s||s.toUpperCase()==='ASAP')return'ASAP';
  if(s.toLowerCase().indexOf('asap')>=0)return s;
  var parts=s.split(/\s*[\/,~&]\s*/);
  var res=[];
  parts.forEach(function(p){
    var k=p.trim().toLowerCase().replace(/[^a-z]/g,'');
    var m=MONTHS[k];
    if(!m){res.push(p.trim());return;}
    res.push(m<=nm?'ASAP':p.trim());
  });
  var seen=false;
  var clean=res.filter(function(r){if(r==='ASAP'){if(seen)return false;seen=true;}return true;});
  if(clean.every(function(r){return r==='ASAP';}))return'ASAP';
  return clean.join(' / ');
}

/* ── Init ── */
function init(){
  var sv=localStorage.getItem('bridge-esl-jobs');
  if(sv){try{jobs=JSON.parse(sv);}catch(e){jobs=JSON.parse(JSON.stringify(DEFAULT_JOBS));}}
  else{jobs=JSON.parse(JSON.stringify(DEFAULT_JOBS));}
  buildThemePicker();buildOrder();renderList();startClock();setupFilters();buildPostInfo();
}

function persist(){localStorage.setItem('bridge-esl-jobs',JSON.stringify(jobs));}

/* ── Clock ── */
function startClock(){var e=document.getElementById('clk');(function t(){var n=new Date();e.textContent=n.toLocaleTimeString('en-GB',{hour12:false});setTimeout(t,1000);})();}

/* ── Filters ── */
var FILTERS=[{k:'all',l:'All'},{k:'premium',l:'Premium'},{k:'hot',l:'HOT'},{k:'seoul',l:'Seoul'},{k:'gg',l:'GG+IC'},{k:'etc',l:'Others'}];
function setupFilters(){
  var b=document.getElementById('fB');
  b.innerHTML=FILTERS.map(function(f){return'<span class="chip'+(f.k==='all'?' on':'')+'" data-f="'+f.k+'">'+f.l+'</span>';}).join('');
  b.querySelectorAll('.chip').forEach(function(c){c.addEventListener('click',function(){b.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});c.classList.add('on');curF=c.dataset.f;renderList();});});
}

/* ── Job List ── */
function renderList(){
  var el=document.getElementById('jL'),q=document.getElementById('sI').value.toLowerCase().trim();
  var fl=jobs.filter(function(j){
    if(q&&j.l.toLowerCase().indexOf(q)<0&&j.id.indexOf(q)<0)return false;
    if(curF==='premium')return j._pinned;if(curF==='hot')return j.h;
    if(curF==='seoul')return j.r==='seoul';if(curF==='gg')return j.r==='gg';if(curF==='etc')return j.r==='etc';
    return true;
  });
  var h='';
  fl.forEach(function(j){h+=jiH(j);});
  if(!fl.length)h='<div style="padding:20px;text-align:center;color:var(--g4)">No jobs found</div>';
  el.innerHTML=h;
  el.querySelectorAll('.ji').forEach(function(it){it.addEventListener('click',function(){selJob(jobs.findIndex(function(j){return j.id===it.dataset.j;}));});});
}
function jiH(j){
  var i=jobs.indexOf(j),s=i===selIdx?' sel':'',p=j._pinned?' pm':'';
  return'<div class="ji'+s+p+'" data-j="'+j.id+'"><span class="jn">#'+j.id+'</span><span class="jl2">'+esc(j.l)+'</span><span class="js">'+esc(j.sal)+'</span>'+(j.h?'<span class="bd bd-h">HOT</span>':'')+(j.a?'<span class="bd bd-on">ON</span>':'<span class="bd bd-off">OFF</span>')+'</div>';
}

/* ── Edit ── */
function selJob(i){
  selIdx=i;var j=jobs[i];if(!j)return;
  /* Switch to style tab when job is selected */
  document.querySelectorAll('.ctab').forEach(function(c){c.classList.remove('on');});
  var st=document.querySelector('.ctab[data-p="style"]');if(st)st.classList.add('on');
  document.getElementById('cPost').style.display='none';
  document.getElementById('ePh').style.display='none';document.getElementById('eF').style.display='block';
  document.getElementById('eT').textContent='Edit #'+j.id+' \u2014 '+j.l;
  document.getElementById('eId').value=j.id;document.getElementById('eLo').value=j.l;

/* ── Job Quality Parsers ── */
function parseWorkHours(hrs){
  /* "08:30~16:30" → 시간 수 (float) */
  var m=(hrs||'').match(/(\d{1,2}):(\d{2})\s*[~\-]\s*(\d{1,2}):(\d{2})/);
  if(!m)return 8;
  var s=parseInt(m[1])*60+parseInt(m[2]),e=parseInt(m[3])*60+parseInt(m[4]);
  if(e<=s)e+=24*60;
  return(e-s)/60;
}
function parseVacDays(txt){
  /* txt에서 Vacation 줄 파싱 → 일수 (최솟값 기준) */
  var t=txt||'';
  var mw=t.match(/vacation:\s*(\d+)\s*~\s*(\d+)\s*weeks?/i);if(mw)return parseInt(mw[1])*5;
  var mw2=t.match(/vacation:\s*(\d+)\s*weeks?/i);if(mw2)return parseInt(mw2[1])*5;
  var md=t.match(/vacation:\s*(\d+)\s*~\s*(\d+)\s*days?/i);if(md)return parseInt(md[1]);
  var md2=t.match(/vacation:\s*(\d+)\s*days?/i);if(md2)return parseInt(md2[1]);
  return 0;
}
function parseSalMin(sal){
  /* "2.30m-2.80m" → 230 (만원 단위) */
  var m=(sal||'').match(/([\d.]+)m/i);return m?Math.round(parseFloat(m[1])*100):999;
}
function isPopular(j){
  /* 인기 직업: 근무시간 ≤7h 또는 휴가 ≥20일 */
  return parseWorkHours(j.hrs)<=7||parseVacDays(j.txt)>=20;
}
function isExcluded(j){
  /* 광고 제외: 풀근무(≥8h) + 저급여(≤230만) — Premium은 항상 포함 */
  if(j.p)return false;
  return parseWorkHours(j.hrs)>=8&&parseSalMin(j.sal)<=230;
}

/* ── Shuffle + buildOrder ── */
function doShuffle(){buildOrder();renderList();toast('Shuffled!','ok');if(lastHtml)generateAd();}

function buildOrder(){
  var act=jobs.filter(function(j){return j.a;}),inact=jobs.filter(function(j){return!j.a;});
  var cands=act.filter(function(j){return j.p||isPopular(j);});
  var others=act.filter(function(j){return!j.p&&!isPopular(j);});
  /* 셔플: 우수 후보 풀 → 5~6개 선정 */
  for(var i=cands.length-1;i>0;i--){var k=Math.floor(Math.random()*(i+1));var t=cands[i];cands[i]=cands[k];cands[k]=t;}
  var target=Math.floor(Math.random()*2)+5;
  var pm3=cands.slice(0,target),ov=cands.slice(target);
  /* HOT + _pinned 마킹 */
  act.forEach(function(j){j._pinned=false;j.h=false;});
  pm3.forEach(function(j){j.h=true;j._pinned=true;});
  ov.forEach(function(j){j.h=isPopular(j)||j.p;});
  others.forEach(function(j){j.h=isPopular(j)||j.p;});
  /* 전체 active를 한 번 더 셔플 — HOT 직업이 리스트 전반에 고루 분포 */
  var allAct=[].concat(act);
  for(var i=allAct.length-1;i>0;i--){var k=Math.floor(Math.random()*(i+1));var t=allAct[i];allAct[i]=allAct[k];allAct[k]=t;}
  jobs=[].concat(allAct,inact);persist();
}

/* ── Anti-Copy Obfuscation ── */
function rnd(){return Math.random().toString(36).slice(2,6);}
function obfCls(base){
  if(obsLv===1)return base+'-'+rnd();
  if(obsLv===2)return btoa(base+'-'+rnd()).replace(/[=+\/]/g,'').slice(0,10);
  return'x'+rnd()+rnd();
}

  +'<div class="pi-lbl">📋 Job Title — 클릭 선택 후 복사</div>'
  +'<div class="titbox" id="titList">'+titHtml+'</div>'
  +'<div class="pi-row" style="margin-top:8px;gap:8px">'
  +'<input type="text" class="pi-inp" id="selTitI" placeholder="클릭하여 선택하거나 직접 입력..." oninput="this._custom=true">'

  +'<span style="font-size:10px;color:var(--g4);margin:auto 0 auto 4px">API 키 필요</span>'
  +'</div>'
  +'</div>'
  /* Date range */
  +'<div>'
  +'<div class="pi-lbl">📅 게시 기간 (Start → End, 30일)</div>'
  +'<div class="pi-fixed">'
  +'<span class="pi-fk">Start Date</span><span class="pi-fv">'+esc(dt.start)+'</span><button class="cpbtn sm" onclick="copyField(\''+dt.start.replace(/'/g,"\\'")+'\')" >복사</button>'
  +'<span class="pi-div" style="grid-column:1/-1"></span>'
  +'<span class="pi-fk">End Date</span><span class="pi-fv">'+esc(dt.end)+'</span><button class="cpbtn sm" onclick="copyField(\''+dt.end.replace(/'/g,"\\'")+'\')">복사</button>'
  +'</div>'
  +'</div>'
  /* Fixed fields */
  +'<div>'
  +'<div class="pi-lbl">📍 고정 필드 — ESLCafe 입력 값</div>'
  +'<div class="pi-fixed">'
  +'<span class="pi-fk">Job Location</span><span class="pi-fv">SOUTH KOREA</span><button class="cpbtn sm" onclick="copyField(\'SOUTH KOREA\')">복사</button>'
  +'<span class="pi-div" style="grid-column:1/-1"></span>'
  +'<span class="pi-fk">Company Name</span><span class="pi-fv">BRIDGE</span><button class="cpbtn sm" onclick="copyField(\'BRIDGE\')">복사</button>'

}

function selTitle(el){
  document.querySelectorAll('.titcard').forEach(function(c){c.classList.remove('sel');});
  el.classList.add('sel');
  var t=decodeURIComponent(el.dataset.t);
  var inp=document.getElementById('selTitI');
  if(inp&&!inp._custom)inp.value=t;
  else if(inp)inp.value=t;
}

function copyField(v){
  if(!v){toast('복사할 값 없음','er');return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(v).then(function(){toast('복사됨!','ok');}).catch(function(){_fallbackCopy(v);});
  } else {_fallbackCopy(v);}
}
function _fallbackCopy(v){
  var t=document.createElement('textarea');t.value=v;t.style.position='fixed';t.style.left='-9999px';
  document.body.appendChild(t);t.select();
  try{document.execCommand('copy');toast('복사됨!','ok');}catch(e){toast('복사 실패','er');}
  document.body.removeChild(t);
}

function generateTitlesAI(){
  var key=prompt('Anthropic API Key (sk-ant-...):','');
  if(!key||!key.startsWith('sk-'))return;
  var btn=document.querySelector('[onclick="generateTitlesAI()"]');
  if(btn){btn.textContent='⏳ 생성 중...';btn.disabled=true;}
  var nm=new Date();
  var MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var curM=MN[nm.getMonth()],nxtM=MN[(nm.getMonth()+1)%12];
  var promptTxt='Generate 30 creative, varied job posting titles for a Korean ESL teaching recruitment agency called BRIDGE. Requirements:\n- Each title under 80 characters\n- Mix: some with emojis, some professional, some urgent\n- Vary locations (Seoul, Gyeonggi, Busan, Jeju, nationwide)\n- Vary salary info, start months ('+curM+', '+nxtM+', ASAP)\n- Return ONLY a JSON array of 30 strings, no other text';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2048,messages:[{role:'user',content:promptTxt}]})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error.message);
    var txt=(d.content&&d.content[0]&&d.content[0].text)||'';
    var m=txt.match(/\[[\s\S]*?\]/);if(!m)throw new Error('JSON 없음');
    var titles=JSON.parse(m[0]);if(!Array.isArray(titles)||!titles.length)throw new Error('빈 배열');
    var box=document.getElementById('titList');
    if(box){box.innerHTML=titles.map(function(t,i){
      return '<div class="titcard" onclick="selTitle(this)" data-t="'+encodeURIComponent(t)+'">'
      +'<span class="titnum">'+(i+1)+'</span><span class="tittxt">'+esc(t)+'</span>'
      +'<button class="cpbtn sm" onclick="event.stopPropagation();copyField(decodeURIComponent(this.closest(\'.titcard\').dataset.t))">복사</button>'
      +'</div>';
    }).join('');}
    toast('AI 제목 '+titles.length+'개 생성!','ok');
  }).catch(function(e){
    toast('오류: '+(e.message.indexOf('CORS')>=0||e.message.indexOf('fetch')>=0?'CORS차단-독립파일실행필요':e.message),'er');
  }).finally(function(){if(btn){btn.textContent='🤖 AI 제목 30개 생성';btn.disabled=false;}});
}

/* ── Utils ── */
function toast(m,t){var e=document.getElementById('tst');e.textContent=m;e.className='toast toast-'+t+' v';setTimeout(function(){e.classList.remove('v');},2200);}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ── Anti-Copy: zero-width character injection ──
   Inserts invisible Unicode chars between every character.
   Copied text becomes garbage while looking normal on screen. */
var ZW=['\u200B','\u200C','\u200D','\uFEFF','\u2060','\u180E'];
function zw(s){
  if(!s)return s;
  var out='';
  for(var i=0;i<s.length;i++){
    out+=s[i];
    if(i<s.length-1&&s[i]!==' '&&s[i+1]!==' '){
      out+=ZW[Math.floor(Math.random()*ZW.length)];
    }
  }
  return out;
}
/* Protected escape: HTML-escape + zero-width injection */
function pesc(s){return zw(esc(s));}

var NODRAG='draggable="false" ondragstart="return false" ';
